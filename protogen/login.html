<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Business Relationship Manager Portal — Truist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --p950:#150428; --p900:#2D0A4E; --p800:#4B286D;
    --p700:#5E3485; --p600:#7B4DB5; --p500:#9B6FCC;
    --p400:#B898DC; --p300:#D4BEF0; --p200:#E8DCFA;
    --p100:#F3EDFC; --p50:#F9F6FE;
    --bg:#F2EEF9; --sur:#fff;
    --bdr:#DDD3EF; --bdr-l:#EDE5F8;
    --tx:#1A0B2E; --tx2:#503D6A; --tx3:#8B78A8;
    --red:#D93025;
    --rmd:10px; --rlg:14px; --rfull:9999px;
    --ssm:0 1px 3px rgba(75,40,109,.08),0 1px 2px rgba(75,40,109,.04);
    --smd:0 4px 16px rgba(75,40,109,.10),0 2px 4px rgba(75,40,109,.06);
    --slg:0 8px 28px rgba(75,40,109,.14),0 4px 8px rgba(75,40,109,.08);
  }

  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--tx);
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    width: 100%;
    padding: 24px;
  }

  .login-header {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .login-brand-row {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .login-brand-divider {
    width: 1px;
    height: 36px;
    background: var(--bdr);
    flex-shrink: 0;
  }

  .login-portal-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--tx2);
    letter-spacing: -.01em;
    line-height: 1.3;
    text-align: left;
    max-width: 200px;
  }

  .login-sub {
    font-size: 15px;
    font-weight: 400;
    color: var(--tx3);
    letter-spacing: .01em;
  }

  .login-card {
    background: var(--sur);
    border: 1px solid var(--bdr-l);
    border-radius: var(--rlg);
    padding: 32px 36px 36px;
    width: 100%;
    max-width: 480px;
    box-shadow: var(--slg);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .field-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--tx);
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 13px;
    color: var(--tx3);
    pointer-events: none;
    display: flex;
    align-items: center;
  }

  .pw-input {
    width: 100%;
    height: 48px;
    padding: 0 14px 0 40px;
    font-size: 15px;
    font-family: inherit;
    color: var(--tx);
    background: var(--sur);
    border: 1.5px solid var(--bdr);
    border-radius: var(--rmd);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }

  .pw-input::placeholder {
    color: var(--tx3);
    font-weight: 400;
  }

  .pw-input:focus {
    border-color: var(--p500);
    box-shadow: 0 0 0 3px rgba(155,111,204,.18);
  }

  .pw-input.error {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(217,48,37,.12);
  }

  .error-msg {
    font-size: 13px;
    font-weight: 500;
    color: var(--red);
    display: none;
    margin-top: -4px;
  }

  .error-msg.visible {
    display: block;
  }

  .submit-btn {
    width: 100%;
    height: 52px;
    background: linear-gradient(135deg, var(--tx) 0%, var(--p950) 100%);
    color: #fff;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -.01em;
    border: none;
    border-radius: var(--rmd);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 2px 8px rgba(21,4,40,.3);
  }

  .submit-btn:hover {
    opacity: .92;
    box-shadow: 0 4px 14px rgba(21,4,40,.4);
  }

  .submit-btn:active {
    transform: scale(.985);
  }

  .submit-btn svg {
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-header">
    <div class="login-brand-row">
      <img src="Truist_Financial_logo.svg" alt="Truist" style="height:36px;width:auto;object-fit:contain;flex-shrink:0">
      <div class="login-brand-divider"></div>
      <p class="login-portal-name">Small Business<br>RM Portal</p>
    </div>
    <p class="login-sub">Restricted Access &bull; Please enter passcode</p>
  </div>

  <div class="login-card">
    <div class="field-group">
      <label class="field-label" for="pw-field">Site Password</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <input
          id="pw-field"
          class="pw-input"
          type="password"
          placeholder="Enter password"
          autocomplete="current-password"
          autofocus
        />
      </div>
      <span class="error-msg" id="error-msg">Incorrect password. Please try again.</span>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="checkPassword()">
      Access Prototype
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const input = document.getElementById('pw-field');
  const errorMsg = document.getElementById('error-msg');

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
    if (errorMsg.classList.contains('visible')) {
      errorMsg.classList.remove('visible');
      input.classList.remove('error');
    }
  });

  function checkPassword() {
    const val = input.value;
    if (val === 'slalom') {
      sessionStorage.setItem('proto_auth', '1');
      window.location.href = 'index.html';
    } else {
      input.classList.add('error');
      errorMsg.classList.add('visible');
      input.value = '';
      input.focus();
    }
  }
</script>
</body>
</html>
