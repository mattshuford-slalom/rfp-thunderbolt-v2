<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RM Portal — Truist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root {
  --p950:#150428; --p900:#2D0A4E; --p800:#4B286D;
  --p700:#5E3485; --p600:#7B4DB5; --p500:#9B6FCC;
  --p400:#B898DC; --p300:#D4BEF0; --p200:#E8DCFA;
  --p100:#F3EDFC; --p50:#F9F6FE;
  --bg:#F2EEF9; --sur:#fff;
  --bdr:#DDD3EF; --bdr-l:#EDE5F8;
  --tx:#1A0B2E; --tx2:#503D6A; --tx3:#8B78A8;
  --red:#D93025; --red-l:#FEE8E6; --red-s:#E74C3C;
  --amb:#B45309; --amb-l:#FEF3E2; --amb-s:#D97706;
  --grn:#1A7A47; --grn-l:#EAFAF1; --grn-d:#27AE60;
  --gray-d:#A09CB0;
  --rmd:10px; --rlg:14px; --rfull:9999px;
  --ssm:0 1px 3px rgba(75,40,109,.08),0 1px 2px rgba(75,40,109,.04);
  --smd:0 4px 16px rgba(75,40,109,.10),0 2px 4px rgba(75,40,109,.06);
  --spur:0 4px 14px rgba(75,40,109,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column}

/* ── APP SHELL ──────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOPBAR ─────────────────────────────────────────────── */
.topbar{height:79px;border-bottom:1px solid var(--bdr-l);background:linear-gradient(180deg,#fff 0%,var(--p50) 100%);display:flex;align-items:center;padding:0 31px;gap:18px;flex-shrink:0;z-index:20}
.tb-logo{display:flex;flex-direction:row;align-items:center;gap:11px;cursor:pointer;text-decoration:none;line-height:1}
.tb-logo-text{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.tb-brand{font-size:20px;font-weight:700;color:var(--p900);letter-spacing:-.02em}
.tb-sub{font-size:12px;font-weight:500;color:var(--tx3);letter-spacing:.02em}
.tb-spacer{flex:1}
.tb-date{font-size:14px;font-weight:500;color:var(--tx3);white-space:nowrap}
.tb-cop{font-size:14px;font-weight:600;padding:9px 20px;border:1px solid var(--p300);border-radius:var(--rfull);color:var(--p700);cursor:pointer;background:#fff;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;user-select:none}
.tb-cop.on{background:linear-gradient(135deg,var(--p700),var(--p900));color:#fff;border-color:transparent;box-shadow:var(--spur)}
.tb-back{font-size:15px;font-weight:500;color:var(--tx3);cursor:pointer;display:flex;align-items:center;gap:4px;text-decoration:none}
.tb-back:hover{color:var(--p700)}
.tb-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--p600),var(--p900));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 2px 6px rgba(75,40,109,.3)}.tb-av-info{display:flex;flex-direction:column;line-height:1.2}.tb-av-name{font-size:13px;font-weight:600;color:var(--tx)}.tb-av-role{font-size:11px;color:var(--tx3)}

/* ── LAYOUT ─────────────────────────────────────────────── */
.layout{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar{width:208px;border-right:1px solid var(--bdr-l);background:linear-gradient(180deg,var(--p50) 0%,#fff 60%);display:flex;flex-direction:column;align-items:flex-start;padding:18px 12px;gap:4px;flex-shrink:0}
.sb-ic{width:100%;height:48px;border-radius:var(--rmd);display:flex;align-items:center;gap:12px;padding:0 12px;color:var(--tx3);cursor:pointer;transition:all .15s;text-decoration:none;border:none;background:transparent;font-size:13px;font-weight:500}
.sb-ic:hover{background:var(--p100);color:var(--p700)}.sb-ic svg{flex-shrink:0}
.sb-ic.on{background:linear-gradient(145deg,var(--p700),var(--p900));color:#fff;box-shadow:0 3px 10px rgba(75,40,109,.35)}
.sb-div{width:100%;height:1px;background:var(--bdr-l);margin:8px 0}

/* ── MAIN ───────────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}

/* ── COPILOT PANEL ──────────────────────────────────────── */
.cp-panel{width:400px;border-left:1px solid var(--bdr-l);display:flex;flex-direction:column;flex-shrink:0;background:#fff;transition:width .2s,opacity .2s}
.cp-panel.off{width:0;opacity:0;overflow:hidden;pointer-events:none;border:none}
.cp-hd{height:52px;padding:0 16px;background:linear-gradient(140deg,var(--p900),var(--p700));border-bottom:none;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cp-hd-l{display:flex;align-items:center;gap:8px}
.cp-hd-r{display:flex;align-items:center;gap:2px}
.cp-ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cp-ttl{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em}
.cp-icon-btn{width:28px;height:28px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.cp-icon-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.cp-x{width:28px;height:28px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.cp-x:hover{background:rgba(255,255,255,.15);color:#fff}
.cp-ctx{padding:5px 16px;border-bottom:1px solid var(--bdr-l);font-size:10.5px;font-weight:700;color:var(--p600);background:var(--p50);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px 32px;pointer-events:none}
.cp-ask{font-size:26px;font-weight:800;color:var(--tx);text-align:center;line-height:1.2;letter-spacing:-.03em}
.cp-msgs{flex:1;padding:12px 14px 6px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}
.msg{font-size:13.5px;line-height:1.65;padding:10px 13px;border-radius:14px}
.msg.usr{background:linear-gradient(135deg,var(--p700),var(--p600));color:#fff;align-self:flex-end;max-width:88%;box-shadow:0 2px 8px rgba(75,40,109,.22);border-bottom-right-radius:4px}
.msg.ast{background:#f5f5f5;color:var(--tx2);border-top-left-radius:4px}
.msg.typ{background:#f5f5f5;color:var(--tx3);letter-spacing:3px;align-self:flex-start;border-top-left-radius:4px}
.cp-in-area{padding:10px 14px 14px;background:#fff;flex-shrink:0}
.cp-in-wrap{border:1.5px solid #ddd;border-radius:14px;background:#fff;transition:border-color .15s,box-shadow .15s}
.cp-in-wrap:focus-within{border-color:var(--p400);box-shadow:0 0 0 3px rgba(155,111,204,.12)}
.cp-in{width:100%;font-size:14px;font-family:inherit;padding:12px 14px 6px;border:none;color:var(--tx);background:transparent;outline:none;resize:none;line-height:1.5;min-height:44px;max-height:120px;overflow-y:auto;display:block}
.cp-in::placeholder{color:#aaa}
.cp-in-toolbar{display:flex;align-items:center;justify-content:space-between;padding:4px 10px 8px}
.cp-in-plus{width:28px;height:28px;border-radius:50%;border:1.5px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;line-height:1;color:#666;cursor:pointer;transition:all .15s;font-family:inherit}
.cp-in-plus:hover{border-color:var(--p400);color:var(--p700)}
.cp-btn{width:30px;height:30px;background:transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--tx3);cursor:pointer;flex-shrink:0;border:none;font-family:inherit;transition:all .15s}
.cp-btn:hover{color:var(--p700);background:var(--p100)}
.cp-btn.listening{color:var(--red);animation:mic-pulse 1s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.18);opacity:.75}}
.cp-cards{padding:0 14px 12px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.cp-card{border:1px solid #e0e0e0;border-radius:12px;padding:13px 16px;font-size:13.5px;color:var(--tx);cursor:pointer;background:#fff;transition:background .12s,border-color .12s;line-height:1.45;text-align:left;user-select:none;width:100%;font-family:inherit;box-shadow:none}
.cp-card:hover{background:#f9f9fc;border-color:var(--p300)}
.cp-card-link{color:var(--p700);font-weight:600}
.cp-see-more{text-align:right;font-size:12.5px;font-weight:500;color:#888;cursor:pointer;padding:0 2px;transition:color .12s;user-select:none;background:none;border:none;font-family:inherit;width:100%}
.cp-see-more:hover{color:var(--p700)}

/* ── CONTENT ─────────────────────────────────────────────── */
.content{padding:14px;display:flex;flex-direction:column;gap:11px}

/* ── STAT ROW ────────────────────────────────────────────── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-box{background:var(--sur);border:1px solid var(--bdr-l);border-radius:var(--rmd);padding:22px;position:relative;overflow:hidden}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--p400),var(--p600));border-radius:3px 3px 0 0}
.stat-n{font-size:36px;font-weight:700;color:var(--tx);margin-bottom:6px;letter-spacing:-.03em;line-height:1}
.stat-l{font-size:14px;font-weight:500;color:var(--tx3)}
.stat-n.warn{color:var(--red)}
.stat-box.is-warn::before{background:linear-gradient(90deg,var(--red-s),#C0392B)}
.stat-n.ok{color:var(--grn)}
.stat-box.is-ok::before{background:linear-gradient(90deg,var(--grn-d),var(--grn))}

/* ── LIST CARD ───────────────────────────────────────────── */
.lcard{border:1px solid var(--bdr);border-radius:var(--rmd);overflow:hidden;box-shadow:var(--ssm)}
.lcard-hd{padding:8px 14px;background:linear-gradient(180deg,var(--p50),var(--p100));border-bottom:1px solid var(--bdr-l);display:flex;align-items:center;justify-content:space-between}
.lcard-lbl{font-size:13px;font-weight:700;color:var(--p800);letter-spacing:.05em;text-transform:uppercase}
.lcard-ct{font-size:13px;font-weight:600;color:var(--p700);background:var(--p200);padding:2px 9px;border-radius:var(--rfull)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.ocard{background:var(--sur);border:1px solid var(--bdr-l);border-radius:var(--rmd);padding:16px 18px;cursor:pointer;transition:box-shadow .15s,border-color .15s;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;box-shadow:var(--ssm)}
.ocard::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;border-radius:3px 3px 0 0;background:linear-gradient(90deg,var(--p400),var(--p600))}
.ocard.h-r{background:#fff}
.ocard.h-r::before{background:linear-gradient(90deg,var(--red-s),#C0392B)}
.ocard.h-a{background:#fff}
.ocard.h-a::before{background:linear-gradient(90deg,var(--amb-s),var(--amb))}
.ocard.rec-nudge::before{background:var(--red)}
.ocard.rec-prop::before{background:var(--amb)}
.ocard.rec-rules::before{background:var(--grn)}
.ocard.rec-rt::before{background:var(--p600)}
.ocard:hover{box-shadow:0 4px 16px rgba(75,40,109,.13);border-color:var(--p300)}
.ocard-top{display:flex;align-items:center}
.ocard-names{flex:1;min-width:0}
.ocard-pill-row{display:flex;align-items:center;gap:8px}
.ocard-co{font-size:15px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ocard-poc{font-size:12px;color:var(--tx3);margin-top:1px}
.ocard-why{font-size:13px;color:var(--tx2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ocard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.ocard-time{font-size:12px;color:var(--tx3);font-weight:500}

/* ── CLIENT ROWS ─────────────────────────────────────────── */
.crow{display:flex;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid var(--bdr-l);cursor:pointer;position:relative;transition:background .12s}
.crow:last-child{border-bottom:none}
.crow:hover{background:var(--p50)}
.ns{position:absolute;left:0;top:0;bottom:0;width:3px}
.ns.r{background:var(--red-s)}
.ns.a{background:var(--amb-s)}
.cav{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--p200),var(--p300));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--p800);flex-shrink:0;border:1.5px solid var(--p300)}
.cbody{flex:1;min-width:0}
.cname{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:2px;letter-spacing:-.01em}
.ctrig{font-size:13px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chev{font-size:18px;color:var(--p400);line-height:1}
.ctime{font-size:10px;font-weight:500;color:var(--tx3)}

/* ── BADGES ──────────────────────────────────────────────── */
.badge{font-size:12px;font-weight:700;padding:2px 8px;border-radius:var(--rfull);letter-spacing:.01em;white-space:nowrap}
.b-rt{background:var(--p100);color:var(--p700);border:1px solid var(--p300)}
.b-prop{background:var(--amb-l);color:var(--amb);border:1px solid rgba(212,130,0,.2)}
.b-rules{background:var(--grn-l);color:var(--grn);border:1px solid rgba(39,174,96,.2)}
.b-nudge{background:var(--red-l);color:var(--red);border:1px solid rgba(231,76,60,.2)}

/* ── CLIENT WORKSPACE HEADER ─────────────────────────────── */
.ch{padding:13px 14px;border-bottom:1px solid var(--bdr-l);display:flex;align-items:center;gap:16px;flex-shrink:0;background:linear-gradient(180deg,var(--p50),#fff)}
.chav{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--p700),var(--p950));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 3px 12px rgba(75,40,109,.3)}
.chname{font-size:18px;font-weight:700;color:var(--tx);letter-spacing:-.02em}
.chsub{font-size:13px;font-weight:500;color:var(--tx3);margin-top:2px}
.chbadges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}

/* ── TAB BAR (hidden — state kept for Copilot context) ────── */
.tabs{display:none}
.tab{display:none}

/* ── SECTION DIVIDERS ───────────────────────────────────── */
.sec-div{display:flex;align-items:center;gap:10px;padding:20px 0 8px}
.sec-div-lbl{font-size:11px;font-weight:700;color:var(--p600);letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.sec-div-line{flex:1;height:1px;background:linear-gradient(90deg,var(--bdr),transparent)}

/* ── TAB CONTENT ─────────────────────────────────────────── */
.tcont{padding:14px;display:flex;flex-direction:column;gap:10px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sblock{border:1px solid var(--bdr-l);border-radius:var(--rmd);padding:10px 12px;display:flex;flex-direction:column;gap:6px;background:var(--sur)}
.sbtitle{font-size:12px;font-weight:700;color:var(--p600);letter-spacing:.07em;text-transform:uppercase}
.sbbody{font-size:14px;color:var(--tx2);line-height:1.6}
.sbbody strong{font-weight:700;color:var(--tx)}
.tp-list{display:flex;flex-direction:column;gap:6px}
.tp-item{display:flex;gap:9px;font-size:14px;color:var(--tx2);line-height:1.55}
.tp-n{font-size:13px;font-weight:700;color:var(--p500);flex-shrink:0;width:16px;padding-top:1px}
.act-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:var(--rmd);border:1px solid var(--bdr);font-size:14px;font-weight:600;color:var(--tx);background:transparent;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:-.01em}
.btn:hover{border-color:var(--p400);color:var(--p700);background:var(--p50)}
.btn.pri{background:linear-gradient(135deg,var(--p700),var(--p900));color:#fff;border-color:transparent;box-shadow:var(--spur)}
.btn.pri:hover{background:linear-gradient(135deg,var(--p600),var(--p800));box-shadow:0 6px 18px rgba(75,40,109,.4)}

/* ── CONTEXT TAB ─────────────────────────────────────────── */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.citem{border:1px solid var(--bdr-l);border-radius:var(--rmd);padding:9px 10px}
.ckey{font-size:12px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.cval{font-size:15px;font-weight:600;color:var(--tx)}
.cval.sm{font-size:14px;font-weight:400;color:var(--tx2);line-height:1.5}

/* ── PORTFOLIO TAB ───────────────────────────────────────── */
.pi{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr-l)}
.pi:last-child{border-bottom:none}
.pi-name{font-size:15px;font-weight:500;color:var(--tx)}
.pi-meta{font-size:13px;color:var(--tx3);margin-top:2px}
.pi-badge{font-size:13px;font-weight:600;color:var(--p700);background:var(--p100);padding:3px 10px;border-radius:var(--rfull);border:1px solid var(--p300)}

/* ── LOG OUTCOME TAB ─────────────────────────────────────── */
.radio-grp{display:flex;gap:8px;flex-wrap:wrap}
.rchip{padding:7px 16px;border-radius:var(--rfull);border:1px solid var(--bdr);font-size:14px;font-weight:600;color:var(--tx3);cursor:pointer;transition:all .15s;user-select:none}
.rchip:hover{border-color:var(--p400);color:var(--p700)}
.rchip.s-conv{background:var(--grn-l);color:var(--grn);border-color:rgba(39,174,96,.3)}
.rchip.s-pend{background:var(--amb-l);color:var(--amb);border-color:rgba(212,130,0,.3)}
.rchip.s-dism{background:var(--red-l);color:var(--red);border-color:rgba(217,48,37,.3)}
.form-row{display:flex;flex-direction:column;gap:6px}
.form-lbl{font-size:13px;font-weight:600;color:var(--tx2)}
.fselect{font-size:14px;font-family:inherit;padding:7px 10px;border:1px solid var(--bdr);border-radius:var(--rmd);color:var(--tx);background:#fff;outline:none}
.fselect:focus{border-color:var(--p500);box-shadow:0 0 0 3px rgba(155,111,204,.18)}
.ftextarea{width:100%;font-size:14px;font-family:inherit;padding:10px 12px;border:1px solid var(--bdr);border-radius:var(--rmd);color:var(--tx);resize:none;outline:none;line-height:1.6;transition:border-color .15s}
.ftextarea:focus{border-color:var(--p500);box-shadow:0 0 0 3px rgba(155,111,204,.18)}

/* ── SEARCH BAR ──────────────────────────────────────────── */
.sbar{display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid var(--bdr-l);background:var(--p50);flex-wrap:wrap}
.sinput{flex:1;min-width:140px;font-size:14px;font-family:inherit;padding:6px 12px 6px 30px;border:1px solid var(--bdr);border-radius:var(--rfull);color:var(--tx);background:url("data:image/svg+xml,%3Csvg width='13' height='13' viewBox='0 0 13 13' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='5.5' cy='5.5' r='4' stroke='%238B78A8' stroke-width='1.5'/%3E%3Cline x1='9' y1='9' x2='12' y2='12' stroke='%238B78A8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat 10px center,#fff;outline:none;transition:border-color .15s,box-shadow .15s}
.sinput:focus{border-color:var(--p500);box-shadow:0 0 0 3px rgba(155,111,204,.18)}
.sinput::placeholder{color:var(--tx3)}
.fpill{font-size:13px;font-weight:600;padding:4px 13px;border-radius:var(--rfull);border:1px solid var(--bdr);color:var(--tx3);cursor:pointer;white-space:nowrap;transition:all .15s;user-select:none}
.fpill:hover{border-color:var(--p400);color:var(--p700)}
.fpill.on{background:linear-gradient(135deg,var(--p700),var(--p900));color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(75,40,109,.28)}

/* ── BOOK GRID ───────────────────────────────────────────── */
.col-hd{display:grid;grid-template-columns:11px 1fr 1fr 1fr 3fr;gap:12px;align-items:center;padding:7px 13px;border-bottom:1px solid var(--bdr-l);background:#fff}
.col-l{font-size:12px;font-weight:700;color:var(--tx3);letter-spacing:.07em;text-transform:uppercase}
.bgrow{display:grid;grid-template-columns:11px 1fr 1fr 1fr 3fr;gap:12px;align-items:center;padding:10px 13px;border-bottom:1px solid var(--bdr-l);cursor:pointer;transition:background .12s;background:#fff}
.bgrow:last-child{border-bottom:none}
.bgrow:hover{background:var(--p50)}
.bgname{font-size:15px;font-weight:600;color:var(--tx);letter-spacing:-.01em;line-height:1.35}
.bgmeta{font-size:13px;font-weight:500;color:var(--tx3);margin-top:2px;line-height:1.35}
.hdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.h-g{background:var(--grn-d)}
.h-a{background:var(--amb-s)}
.h-r{background:var(--red-s)}
.h-x{background:var(--gray-d)}

/* ── ACTIVITY ────────────────────────────────────────────── */
.arow{display:flex;align-items:flex-start;gap:13px;padding:9px 13px;border-bottom:1px solid var(--bdr-l);transition:background .12s;background:#fff}
.arow:last-child{border-bottom:none}
.arow:hover{background:var(--p50)}
.opill{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.o-c{background:var(--grn-l);color:var(--grn);border:1.5px solid rgba(39,174,96,.25)}
.o-p{background:var(--amb-l);color:var(--amb);border:1.5px solid rgba(212,130,0,.25)}
.o-d{background:var(--red-l);color:var(--red);border:1.5px solid rgba(217,48,37,.3)}
.abody{flex:1}
.aclient{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:2px;letter-spacing:-.01em}
.adesc{font-size:13px;color:var(--tx2);line-height:1.55}
.atime{font-size:12px;font-weight:600;color:var(--tx3);flex-shrink:0;padding-top:3px}
/* ── TIMELINE ─────────────────────────────────────────────── */
.tl-wrap{padding:8px 24px 24px 24px;display:flex;flex-direction:column}
.tl-item{display:grid;grid-template-columns:80px 24px 1fr;gap:0 16px;position:relative;min-height:80px}
.tl-item:not(:last-child) .tl-spine{background:var(--bdr-l)}
.tl-date{font-size:12px;font-weight:600;color:var(--tx3);text-align:right;padding-top:3px;line-height:1.3}
.tl-spine{display:flex;flex-direction:column;align-items:center;gap:0}
.tl-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;z-index:1}
.tl-line{flex:1;width:2px;background:var(--bdr-l);margin:2px 0}
.tl-card{background:#fff;border:1px solid var(--bdr-l);border-radius:var(--rmd);padding:12px 14px;margin-bottom:14px;box-shadow:var(--ssm)}
.tl-client{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:5px}
.tl-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px}
.tl-method{font-size:12px;color:var(--tx3);font-weight:500}
.tl-outcome{font-size:12px;font-weight:700;padding:2px 9px;border-radius:var(--rfull)}
.tl-out-c{background:var(--grn-l);color:var(--grn)}
.tl-out-p{background:var(--amb-l);color:var(--amb)}
.tl-out-d{background:var(--red-l);color:var(--red)}
.tl-notes{font-size:13px;color:var(--tx2);line-height:1.55}

/* ── MODAL ───────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(21,4,40,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.overlay.off{display:none}
.modal{background:#fff;border-radius:var(--rlg);box-shadow:0 24px 64px rgba(21,4,40,.35);max-width:500px;width:100%;overflow:hidden;animation:mup .2s ease}
@keyframes mup{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhd{padding:18px 20px;background:linear-gradient(140deg,var(--p900),var(--p700));display:flex;align-items:center;justify-content:space-between}
.mttl{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.01em}
.mx{font-size:20px;color:rgba(255,255,255,.6);cursor:pointer;line-height:1;transition:color .15s;background:transparent;border:none}
.mx:hover{color:#fff}
.mbody{padding:14px;display:flex;flex-direction:column;gap:10px}
.msec{display:flex;flex-direction:column;gap:6px}
.mlbl{font-size:12px;font-weight:700;color:var(--p600);text-transform:uppercase;letter-spacing:.06em}
.mval{font-size:15px;color:var(--tx2);line-height:1.55}
.mval.hi{color:var(--tx);font-weight:600;font-size:16px}
.mfooter{padding:10px 14px;border-top:1px solid var(--bdr-l);display:flex;gap:8px;justify-content:flex-end;background:var(--p50)}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--p900);color:#fff;padding:12px 20px;border-radius:var(--rmd);font-size:12px;font-weight:600;z-index:300;box-shadow:var(--spur);display:flex;align-items:center;gap:8px;transition:all .3s;animation:tup .3s ease}
@keyframes tup{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.off{display:none}

/* ── EMPTY STATE ─────────────────────────────────────────── */
.empty{padding:34px;text-align:center;color:var(--tx3)}
.empty-ic{font-size:28px;margin-bottom:8px}
.empty-txt{font-size:15px;font-weight:500}
</style>

function route() {
  const h = (location.hash || '#/dashboard').replace('#','');
  if (!h || h === '/' || h === '/dashboard') { S.view = 'dashboard'; S.cid = null; }
  else if (h.startsWith('/client/')) { S.view = 'client'; S.cid = parseInt(h.split('/')[2])||1; S.tab = 'rec'; S.logOut = null; }
  else if (h === '/book') { S.view = 'book'; }
  else if (h === '/activity') { S.view = 'activity'; }
  render();
}
function go(path) { location.hash = path; route(); }

function genWhy(c) {
  const fn = esc(c.co);
  const templates = {
    nudge: [
      `<strong>${c.lcd} days since last RM contact</strong> — propensity at ${c.prop}% suggests high receptivity. Re-engagement window is open now.`,
      `<strong>No outreach logged in ${c.lcd} days</strong> — last interaction indicated interest in expanding the relationship. Competitor risk is elevated.`,
      `<strong>Contact gap of ${c.lcd} days with normal account activity</strong> — client is active but unengaged. Optimal moment to reconnect.`,
      `<strong>${c.lcd}-day contact lapse</strong> — ${c.prop}% propensity score is the highest in the past 90 days for this account.`,
    ],
    propensity: [
      `<strong>Transaction patterns indicate readiness for a new product conversation</strong> — ${c.prop}% propensity, top quartile for ${esc(c.ind)}.`,
      `<strong>Revenue at ${esc(c.rev)} with only ${c.prods.length} active product(s)</strong> — significant wallet share uncaptured. ${c.prop}% propensity confirmed.`,
      `<strong>Under-penetrated vs. comparable ${esc(c.ind)} clients at ${esc(c.rev)}</strong> — peer benchmark shows ${c.prods.length + 2} products typical for this profile.`,
      `<strong>Current mix of ${c.prods.slice(0,2).map(p=>esc(p)).join(' and ')} leaves cross-sell opportunity open</strong> — ${c.prop}% propensity score based on spending patterns.`,
    ],
    rules: [
      `<strong>Account meets threshold for treasury services</strong> — ${esc(c.ind)} profile at ${esc(c.rev)} revenue qualifies. No outreach initiated yet.`,
      `<strong>CD or term product nearing maturity with no renewal outreach logged</strong> — rate-sensitive client, window is closing.`,
      `<strong>${fn} holds ${c.prods.length} product(s) vs. ${c.prods.length + 2} typical for comparable ${esc(c.ind)} clients</strong> — product gap warrants a conversation.`,
      `<strong>BLOC utilization above 70%</strong> — may indicate need for a limit increase or supplemental credit line. Good time to check in.`,
    ],
    rt: [
      `<strong>Browsed financing options on truist.com within the last 24 hours</strong> — high-intent signal. Best window to reach out is now.`,
      `<strong>Wire transfer above average velocity received this morning</strong> — possible liquidity event or contract close. Cash management conversation is timely.`,
      `<strong>Application started but not completed on truist.com</strong> — active need indicated. ${c.prop}% propensity confirms product fit.`,
      `<strong>Large ACH payment received today</strong> — possible contract close or capital infusion. Opportunity to introduce sweep or treasury tools.`,
    ],
  };
  const pool = templates[c.rec] || templates.nudge;
  return pool[c.id % pool.length];
}

function genOpener(c) {
  const fn = esc(c.co.split(' ')[0]);
  const openers = [
    `"Hi, I was reviewing your account and noticed some activity I wanted to follow up on — do you have a few minutes this week?"`,
    `"${fn}, I've been keeping an eye on your account and think there's a timely opportunity worth a quick conversation."`,
    `"I wanted to reach out personally — I noticed some signals in your account that I think are worth discussing."`,
    `"Hi, I'm calling because our system flagged your account for a time-sensitive conversation — happy to walk you through what we're seeing."`,
    `"${fn}, based on your recent activity, I think we have a product that could be a strong fit. Mind if I take 5 minutes to explain?"`,
    `"I was going through my book this morning and your account stood out — wanted to make sure we're supporting you in the right ways."`,
  ];
  return openers[c.id % openers.length];
}

function genTPs(c) {
  const allTPs = [
    `Review current product mix — ${c.prods.length} active product(s) vs. ${c.prods.length + 2} typical for ${esc(c.ind)} clients at ${esc(c.rev)}.`,
    `Explore treasury management fit given current revenue trajectory and employee headcount (${c.emp}).`,
    `Discuss business line of credit to support operational flexibility and working capital.`,
    `Introduce sweep account options to optimize idle cash between billing cycles.`,
    `Review CD or savings laddering strategy to improve liquidity without sacrificing yield.`,
    `Ask about upcoming capital needs — equipment, expansion, or hiring — to position lending products early.`,
    `Highlight Merchant Services if retail/service volume is growing — fee savings opportunity.`,
    `Discuss payroll integration if headcount is above 10 — simplify ops and deepen relationship.`,
    `Identify referral potential — clients in ${esc(c.ind)} often have strong professional networks.`,
    `Ask about personal banking relationship — Premier referral opportunity if deposits exceed threshold.`,
  ];
  // pick 3 deterministically based on client id
  const i = c.id % allTPs.length;
  return [allTPs[i], allTPs[(i+3)%allTPs.length], allTPs[(i+6)%allTPs.length]];
}

/* ============================================================
   COPILOT
   ============================================================ */
function convKey() { return S.view==='client' ? 'c'+S.cid : 'general'; }
function getConv() {
  const k = convKey();
  if (!S.convs[k]) {
    const c = D.clients.find(x=>x.id===S.cid);
    S.convs[k] = [{ r:'sys', t: c?`Loaded context for ${c.name}. Ask anything about this client.`:'Ask anything.' }];
  }
  return S.convs[k];
}

function getSuggestions() {
  const c = S.view === 'client' ? D.clients.find(x => x.id === S.cid) : null;
  const fn = c ? c.name.split(' ')[0] : '';
  const conv = getConv();
  const asked = new Set(conv.filter(m => m.r === 'usr').map(m => m.t.toLowerCase()));

  // Helper: has the user already asked about a topic?
  const alreadyAsked = (...patterns) =>
    [...asked].some(t => patterns.some(p => new RegExp(p).test(t)));

  let pool = [];

  if (c) {
    const hasAskedWhy     = alreadyAsked('why','trigger','signal','reason','rec');
    const hasAskedProduct = alreadyAsked('product','hold','have','own','currently');
    const hasAskedOpener  = alreadyAsked('opener','start','begin','call','reach','say','script');
    const hasAskedTP      = alreadyAsked('talk','point','discuss','cover','agenda');
    const hasAskedProp    = alreadyAsked('propensity','likelihood','score','chance');
    const hasAskedRev     = alreadyAsked('revenue','size','emp','employ');
    const hasAskedContact = alreadyAsked('contact','last','when','touch','outreach');
    const hasAskedHealth  = alreadyAsked('health','risk','status','churn');
    const hasAskedWallet  = alreadyAsked('wallet','share','penetrat','miss');
    const hasAskedLog     = alreadyAsked('log','outcome','convert','after','next step');

    // Stage-aware pool: surface what hasn't been covered yet, in logical order
    const progressive = [
      !hasAskedWhy     && `Why was this recommendation triggered?`,
      !hasAskedProduct && `What products does ${fn} currently hold?`,
      !hasAskedOpener  && `What's the best call opener for ${fn}?`,
      !hasAskedTP      && `What are the top talking points?`,
      !hasAskedProp    && `How strong is ${fn}'s propensity score?`,
      !hasAskedWallet  && `What is ${fn}'s wallet share?`,
      !hasAskedRev     && `What's ${fn}'s revenue and team size?`,
      !hasAskedContact && `When was ${fn} last contacted?`,
      !hasAskedHealth  && `How healthy is this account?`,
      !hasAskedLog     && `How should I log an outcome after this call?`,
    ].filter(Boolean);

    // Tab-specific starters shown when conversation is fresh
    if (asked.size === 0) {
      const tabStarters = {
        rec:  [`Why was this recommendation triggered?`, `What's the best call opener for ${fn}?`, `What are the top talking points?`],
        ctx:  [`Summarize ${fn}'s background`, `How healthy is this account?`, `What products is ${fn} missing?`],
        port: [`What is ${fn}'s wallet share?`, `What's the next best product to introduce?`, `How does their mix compare to peers?`],
        log:  [`How should I log a conversion?`, `What do I do if they declined?`, `What's the best follow-up after this call?`],
      };
      pool = tabStarters[S.tab] || tabStarters.rec;
    } else {
      pool = progressive;
    }

    // After an assistant reply, inject contextual drill-downs at the front
    const lastAst = [...conv].reverse().find(m => m.r === 'ast');
    if (lastAst) {
      const r = lastAst.t.toLowerCase();
      const fups = [];
      if (/trigger|signal|wire|intent|browse|payroll up|cd matur/.test(r) && !hasAskedOpener)
        fups.push(`What's the best call opener for ${fn}?`);
      if (/opener|say|reach out/.test(r) && !hasAskedTP)
        fups.push(`What are the top talking points?`);
      if (/talking point|discuss/.test(r) && !hasAskedLog)
        fups.push(`How should I log an outcome after this call?`);
      if (/product|hold|missing|cross/.test(r) && !hasAskedWallet)
        fups.push(`What is ${fn}'s wallet share?`);
      if (/wallet|share|penetrat/.test(r))
        fups.push(`What's the next best product to introduce?`);
      if (/propensity|%/.test(r) && !hasAskedWhy)
        fups.push(`Why was this recommendation triggered?`);
      if (/revenue|employee|industry/.test(r) && !hasAskedProduct)
        fups.push(`What products does ${fn} currently hold?`);
      if (/last contact|days ago|overdue|threshold/.test(r))
        fups.push(`What's the best outreach approach right now?`);
      if (/at.risk|declining|overdue/.test(r) && !hasAskedOpener)
        fups.push(`What's the best call opener for ${fn}?`);
      if (/dismissed|dismissed|declined/.test(r))
        fups.push(`What's the best follow-up after a dismissal?`);
      if (fups.length) pool = [...fups, ...pool.filter(s => !fups.includes(s))];
    }

  } else if (S.view === 'book') {
    pool = [
      `Who hasn't been contacted in 30+ days?`,
      'Which clients are at risk of churning?',
      'Who has the highest propensity score today?',
      'Which clients have an open recommendation?',
      'Which Tier I clients need attention?',
      'Who should I prioritize this week?',
      `How many clients are in my book?`,
      'What is my portfolio coverage rate?',
    ];
  } else if (S.view === 'activity') {
    pool = [
      'How many conversions have I logged this month?',
      'Which recommendations were dismissed?',
      'What outcomes are still pending?',
      'What were my most recent wins?',
      'Which clients still need a follow-up?',
    ];
  } else {
    // Dashboard
    pool = [
      'Who should I call first today?',
      'Which clients have a CD maturing soon?',
      'Are any nudges overdue?',
      'What is my portfolio coverage rate?',
      'Who has the highest propensity score today?',
      'Which clients are at risk?',
      `What's on my outreach list today?`,
    ];
  }

  return pool.filter(s => !asked.has(s.toLowerCase())).slice(0, 6);
}

function scrollCop() { const m=document.getElementById('cp-msgs'); if(m) m.scrollTop=m.scrollHeight; }
function toggleCop() { S.copOpen=!S.copOpen; renderTopbar(); renderCopilot(); }

let _recognition = null;
let _dictating = false;
function toggleDictation() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { showToast('⚠ Speech recognition not supported in this browser'); return; }
  if (_dictating && _recognition) { _recognition.stop(); return; }
  _recognition = new SpeechRecognition();
  _recognition.lang = 'en-US';
  _recognition.interimResults = true;
  _recognition.continuous = false;
  const btn = document.getElementById('cp-mic-btn');
  const inp = document.getElementById('cp-in');
  let interim = '';
  _dictating = true;
  if (btn) btn.classList.add('listening');
  if (inp) inp.placeholder = 'Listening…';
  _recognition.onresult = e => {
    interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (inp) inp.value = final || interim;
    if (inp) { inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 120) + 'px'; }
  };
  _recognition.onend = () => {
    _dictating = false;
    if (btn) btn.classList.remove('listening');
    if (inp) inp.placeholder = 'Message Copilot';
    const val = inp ? inp.value.trim() : '';
    if (val) sendCopilot();
  };
  _recognition.onerror = e => {
    _dictating = false;
    if (btn) btn.classList.remove('listening');
    if (inp) inp.placeholder = 'Message Copilot';
    if (e.error !== 'no-speech' && e.error !== 'aborted') showToast('⚠ Mic error: ' + e.error);
  };
  _recognition.start();
}
function useSuggestion(txt) {
  const inp = document.getElementById('cp-in');
  if (!inp || !txt) return;
  inp.value = txt;
  sendCopilot();
}

function sendCopilot() {
  const inp = document.getElementById('cp-in');
  const txt = inp?.value?.trim();
  if (!txt) return;
  inp.value = '';
  inp.style.height = '';
  const conv = getConv();
  conv.push({ r:'usr', t: esc(txt) });
  S.suggMore = false;
  renderCopilot();
  // typing indicator
  const msgs = document.getElementById('cp-msgs');
  if (msgs) {
    const t = document.createElement('div');
    t.className='msg typ'; t.id='cp-typ'; t.textContent='· · ·';
    msgs.appendChild(t); scrollCop();
  }
  setTimeout(() => {
    conv.push({ r:'ast', t: copilotReply(txt) });
    const msgsEl = document.getElementById('cp-msgs');
    if (msgsEl) {
      msgsEl.innerHTML = conv.filter(m=>m.r!=='sys').map(m=>`<div class="msg ${m.r==='usr'?'usr':'ast'}">${m.t}</div>`).join('');
      scrollCop();
    } else { renderCopilot(); }
    refreshSuggestions();
  }, 800 + Math.random()*600);
}

function copilotReply(q) {
  const qRaw = q;
  q = q.toLowerCase();
  const c = S.view === 'client' ? D.clients.find(x => x.id === S.cid) : null;
  const conv = getConv();
  const lastAst = [...conv].reverse().find(m => m.r === 'ast');
  const lastAstText = lastAst ? lastAst.t.toLowerCase() : '';
  const ALL_PRODS = ['Treasury','BLOC','LOC','CD','Payroll','Card','Merchant Services','Business Savings'];

  if (c) {
    const missing = ALL_PRODS.filter(p => !c.prods.includes(p));
    const top3Missing = missing.slice(0, 3);
    const fn = c.name.split(' ')[0];

    // Why / trigger / signal / recommendation rationale
    if (/why|trigger|signal|reason|rec\b|recommend/.test(q)) {
      const why = WHY[c.id] || genWhy(c);
      const recDetail = {
        nudge:      `With ${c.lcd} days since last RM contact and a ${c.prop}% propensity score, the engagement window is open. Waiting longer increases churn risk.`,
        propensity: `This Offer is driven by a ${c.prop}% model score — ${fn} ranks in the top quartile for ${c.ind} clients at ${c.rev} revenue. Transaction patterns confirm readiness for a new product conversation.`,
        rules:      `This Referral was triggered by an account rule — either a maturing product, utilization threshold, or product gap vs. peer benchmarks for ${c.ind}. Client should be introduced to the relevant product or specialist.`,
        rt:         `This Advice alert is based on a live intent signal. Real-time triggers convert at 2–3× higher rates than scheduled outreach — acting within the next few hours is strongly recommended.`,
      };
      return `${why}<br><br>${recDetail[c.rec] || ''}`;
    }

    // Products held + gap analysis
    if (/product|hold|have|own|currently/.test(q)) {
      const pctWallet = Math.round((c.prods.length / ALL_PRODS.length) * 100);
      return `${fn} currently holds <strong>${c.prods.join(', ')}</strong> — ${c.prods.length} of 8 available products (<strong>${pctWallet}% wallet share</strong>). Strongest gaps for a ${c.ind} business at ${c.rev}: <strong>${top3Missing.join(', ')}</strong>. Peer benchmarks show similar clients average ${c.prods.length + 2} products.`;
    }

    // Wallet share / penetration
    if (/wallet|share|penetrat|miss/.test(q)) {
      const pctWallet = Math.round((c.prods.length / ALL_PRODS.length) * 100);
      return `${fn}'s wallet share is <strong>${pctWallet}%</strong> (${c.prods.length} of 8 products). Comparable ${c.ind} clients at ${c.rev} typically hold ${c.prods.length + 2} products. The highest-value gaps are <strong>${top3Missing[0]}</strong>${top3Missing[1] ? ' and <strong>' + top3Missing[1] + '</strong>' : ''}, based on revenue profile and transaction patterns.`;
    }

    // Revenue / size / firmographic
    if (/revenue|size|big|large|emp|team|headcount/.test(q)) {
      const peerProds = c.prods.length + 2;
      return `${c.co} generates approximately <strong>${c.rev}</strong> in annual revenue with <strong>${c.emp} employees</strong>. Industry: <strong>${c.ind}</strong>, Location: ${c.loc}, Client since ${c.since}. At this revenue level, comparable ${c.ind} companies typically hold ${peerProds} banking products — ${fn} currently has ${c.prods.length}.`;
    }

    // Propensity score context
    if (/propensity|likelihood|score|chance/.test(q)) {
      const tier = c.prop >= 75 ? 'top decile — act now, this window is narrow'
                 : c.prop >= 60 ? 'top quartile — strong signal, good time to reach out'
                 : c.prop >= 45 ? 'above average for this segment'
                 : 'moderate signal — prioritize after higher-propensity clients';
      return `${fn}'s propensity score is <strong>${c.prop}%</strong> (${tier}). Score is driven by ${c.prods.length} active product(s), transaction velocity over the last 90 days, peer benchmarks for ${c.ind} at ${c.rev} revenue, and ${c.lcd > 0 ? `${c.lcd}-day contact gap` : 'recent RM engagement'}.`;
    }

    // Last contact / cadence
    if (/contact|last|when|touch|outreach|cadence/.test(q)) {
      const urgency = c.lcd >= 21 ? `This significantly exceeds the 10-day cadence target — immediate outreach required.`
                    : c.lcd >= 10 ? `This is at the coverage threshold. Schedule a touchpoint today to stay current.`
                    : c.lcd >= 5  ? `Getting close to the 10-day cadence target. Plan a contact within the next few days.`
                    : `Coverage looks current.`;
      const recNote = c.rec ? ` There's also an active <strong>${c.rec}</strong> recommendation requiring a follow-up action.` : '';
      return `Last RM contact with ${fn} was <strong>${c.lc}</strong> (${c.lcd} day${c.lcd === 1 ? '' : 's'} ago). ${urgency}${recNote}`;
    }

    // Notes / background / history
    if (/note|background|context|tell me about|history|summary|summarize/.test(q)) {
      return `${c.notes}<br><br><strong>Key facts:</strong> ${c.tier} client · ${c.ind} · ${c.rev} revenue · ${c.emp} employees · ${c.loc} · Client since ${c.since}.`;
    }

    // Suggest / next product / recommend
    if (/suggest|recommend|next|should|opport|cross.?sell/.test(q)) {
      const topPick = top3Missing[0];
      const fitReason = {
        Treasury:          `cash flow management at ${c.rev} revenue`,
        BLOC:              `flexible working capital for a ${c.emp}-person team`,
        LOC:               `credit access for operational smoothing`,
        CD:                `low-risk yield on idle deposits`,
        Payroll:           `payroll processing with ${c.emp} employees`,
        Card:              `business purchasing and expense control`,
        'Merchant Services': `revenue capture for ${c.ind} businesses`,
        'Business Savings': `tiered yield on excess cash`,
      };
      return `Top cross-sell opportunities for ${fn}: <strong>${top3Missing.join(', ')}</strong>.<br><br>Best immediate fit: <strong>${topPick}</strong> — ${fitReason[topPick] || 'well-matched to this profile'}. With a ${c.prop}% propensity score and ${c.rev} revenue, this is a high-confidence conversation to have.`;
    }

    // Opener / how to start the call / script
    if (/opener|start|begin|open|call|reach|say|script|how to approach/.test(q)) {
      const opener = OPENER[c.id] || genOpener(c);
      const tps = TPS[c.id] || genTPs(c);
      return `Suggested opener: ${opener}<br><br>Lead with: <em>${tps[0]}</em><br><br>Keep it under 30 seconds — goal is to earn the next 5 minutes.`;
    }

    // Talking points
    if (/talk|point|discuss|cover|agenda|prep/.test(q)) {
      const tps = TPS[c.id] || genTPs(c);
      return `Talking points for ${fn}:<br>1. ${tps[0]}<br>2. ${tps[1]}<br>3. ${tps[2]}<br><br>If they push back, acknowledge and pivot to the next point. Log the outcome when you're done.`;
    }

    // Health / risk / churn
    if (/health|risk|status|churn|at.?risk|danger/.test(q)) {
      const healthMsg = {
        r: `<strong>At-risk.</strong> ${fn} hasn't been contacted in ${c.lcd} days and has an active ${c.rec || 'alert'}. Without immediate outreach, churn probability is elevated. Prioritize this call today.`,
        a: `<strong>Needs attention.</strong> ${fn}'s engagement is declining. Contact within the next 3–5 days is recommended to maintain the relationship and act on the open recommendation.`,
        g: `<strong>Healthy.</strong> ${fn}'s account is in good standing. Maintain the regular 10–14 day check-in cadence and look for cross-sell opportunities — propensity is at ${c.prop}%.`,
        x: `<strong>Inactive / no signal.</strong> ${fn} has no current health indicator. They may be newly onboarded or have low engagement. A check-in call is warranted.`,
      };
      return healthMsg[c.health] || `Health status unavailable for ${fn}.`;
    }

    // Outcome logging guidance
    if (/log|outcome|convert|result|after|next step|follow.?up/.test(q)) {
      return `After speaking with ${fn}, log the outcome using the <strong>Log Outcome</strong> section below:<br><br>• <strong>Converted</strong> — product accepted or meeting confirmed. Note what was agreed.<br>• <strong>Pending</strong> — client is interested but not ready. Set a specific follow-up date.<br>• <strong>Dismissed</strong> — client declined. Note their reason — this improves future propensity scoring and resurfaces them in 30–60 days when signals strengthen.`;
    }

    // After dismissal
    if (/dismiss|decline|said no|not interest|reject/.test(q)) {
      return `Log as <strong>Dismissed</strong> and capture their reason in the notes field. Common patterns worth noting: "not the right time," "already working with another provider," or budget constraints. The model will resurface ${fn} when new signals emerge — typically in 30–60 days, or sooner if a real-time trigger fires.`;
    }

    // Peer / benchmark comparison
    if (/peer|benchmark|compar|similar|typical/.test(q)) {
      const peerCount = c.prods.length + 2;
      return `${c.ind} clients at ${c.rev} revenue typically hold <strong>${peerCount} banking products</strong>. ${fn} has ${c.prods.length} — a gap of ${peerCount - c.prods.length} product(s). The most common missing products for this peer group are <strong>${top3Missing.slice(0,2).join(' and ')}</strong>.`;
    }

    // Outreach approach / method / strategy
    if (/approach|method|way|how should i|strategy/.test(q)) {
      const method = c.rec === 'rt' ? 'Phone call — Advice alerts are live intent signals requiring immediate, personal outreach for highest conversion.'
                   : c.lcd >= 14   ? 'Phone call — re-engagement after a long gap is more effective by voice than email.'
                   : c.rec === 'propensity' ? 'Either phone or email — Offer signals are warm but not urgent. A brief personalized email can open the door.'
                   : c.rec === 'rules' ? 'Phone call — Referrals are most effective when introduced personally with a warm tone.'
                   : 'Phone call or email based on your prior relationship with this client.';
      return `Recommended outreach method for ${fn}: <strong>${method}</strong><br><br>Best time to reach ${c.ind} businesses is typically mid-morning (9–11am) or early afternoon (1–3pm) on Tuesday–Thursday.`;
    }

    // Summary / overview / what do I need to know / prepare / quick brief
    if (/summary|overview|brief|prepare|what do i need|what should i know|sum up|catch me up|quick|full picture|situati|what's (going on|the deal|up with)|help me/.test(q)) {
      const why = WHY[c.id] || genWhy(c);
      const opener = OPENER[c.id] || genOpener(c);
      const tps = TPS[c.id] || genTPs(c);
      const pctWallet = Math.round((c.prods.length / ALL_PRODS.length) * 100);
      const urgencyFlag = c.health === 'r' ? '🔴 At-risk — contact today.' : c.health === 'a' ? '🟡 Needs attention soon.' : '🟢 Healthy account.';
      return `<strong>${fn} · ${c.co}</strong>${c.rec ? ` · ${c.rec.charAt(0).toUpperCase() + c.rec.slice(1)} rec` : ''}<br><br>${urgencyFlag}<br><br><strong>Why now:</strong> ${why}<br><br><strong>Opener:</strong> ${opener}<br><br><strong>Talking points:</strong><br>1. ${tps[0]}<br>2. ${tps[1]}<br>3. ${tps[2]}<br><br><strong>Portfolio:</strong> ${c.prods.join(', ')} · ${pctWallet}% wallet share · Top gap: ${top3Missing[0] || 'fully penetrated'}.`;
    }

    // Urgency / red flags / anything I should know
    if (/urgent|flag|alert|red|concern|risk|worried|problem|issue|anything.*(know|note|aware)/.test(q)) {
      const flags = [];
      if (c.health === 'r') flags.push(`Account is <strong>at-risk</strong> — ${c.lcd} days without contact.`);
      if (c.health === 'a') flags.push(`Engagement is <strong>declining</strong> — contact window is narrowing.`);
      if (c.lcd >= 14) flags.push(`<strong>${c.lcd}-day contact gap</strong> exceeds recommended cadence.`);
      if (c.rec === 'rt') flags.push(`<strong>Advice alert active</strong> — live intent signal detected. Conversion rate drops sharply after 24 hours.`);
      if (c.rec === 'nudge') flags.push(`<strong>Nudge triggered</strong> — delay risks losing deal momentum or client trust.`);
      if (c.rec === 'propensity') flags.push(`<strong>Offer queued</strong> — ${c.prop}% model score is near peak. Window won't stay this high indefinitely.`);
      if (c.rec === 'rules') flags.push(`<strong>Referral triggered</strong> — account rule fired. Client should be connected to the relevant product or specialist soon.`);
      if (c.prods.length === 1) flags.push(`<strong>Single-product client</strong> — high churn risk if that product is disrupted.`);
      if (c.prop >= 75) flags.push(`<strong>${c.prop}% propensity</strong> — near-peak signal, won't stay this high indefinitely.`);
      if (!flags.length) flags.push(`No critical flags for ${fn} right now. Account looks stable.`);
      return flags.join('<br>') + (c.rec ? `<br><br>Active rec: <strong>${c.rec}</strong>. ${c.trig || ''}` : '');
    }

    // Sentiment / relationship / how do they feel
    if (/relationship|sentiment|how (are|is|do) (they|we)|feel|trust|happy|satisf|loyal/.test(q)) {
      const sentiment = c.health === 'g' ? `strong` : c.health === 'a' ? `cooling` : c.health === 'r' ? `at risk of souring` : `unclear`;
      return `Relationship with ${fn} appears <strong>${sentiment}</strong>. They've been a client since ${c.since} with ${c.prods.length} active product(s). ${c.notes} Last contact was ${c.lc}${c.rec ? ` — there's an open ${c.rec} recommendation that needs follow-up` : ''}.`;
    }

    // Industry / sector specific questions
    if (/industry|sector|space|type of business|what (kind|type) of/.test(q)) {
      return `${c.co} operates in <strong>${c.ind}</strong> — ${c.loc}, ${c.emp} employees, ${c.rev} revenue. Typical product mix for ${c.ind} businesses at this revenue tier includes ${c.prods.length + 2} banking products. ${fn} currently holds ${c.prods.length}, with ${top3Missing[0]} and ${top3Missing[1] || 'Business Savings'} as the strongest gaps for this industry.`;
    }

    // Fallback for client context — synthesize a useful full-picture answer
    // rather than a dead-end prompt
    const why = WHY[c.id] || genWhy(c);
    const pctWallet = Math.round((c.prods.length / ALL_PRODS.length) * 100);
    const recLine = c.rec
      ? `Active <strong>${c.rec}</strong> recommendation: ${why}`
      : `No active recommendation — but propensity is at <strong>${c.prop}%</strong>.`;
    return `Here's what I know about <strong>${fn}</strong>:<br><br>${recLine}<br><br><strong>Portfolio:</strong> ${c.prods.join(', ')} · ${pctWallet}% wallet share. Top gap: <strong>${top3Missing[0]}</strong>.<br><strong>Last contact:</strong> ${c.lc} · <strong>Propensity:</strong> ${c.prop}% · <strong>Revenue:</strong> ${c.rev} · <strong>Employees:</strong> ${c.emp}.<br><br>${c.notes}`;
  }

  // ── General / non-client view ────────────────────────────

  // First, try to match a client name anywhere in the query — handle "tell me about Ridgeline" etc.
  const mentionedClient = D.clients.find(cl => {
    const nameParts = [cl.name.toLowerCase(), cl.co.toLowerCase(), cl.name.split(' ')[0].toLowerCase()];
    return nameParts.some(part => part.length > 3 && q.includes(part));
  });
  if (mentionedClient) {
    const mc = mentionedClient;
    const fn = mc.name.split(' ')[0];
    const ALL_PRODS2 = ['Treasury','BLOC','LOC','CD','Payroll','Card','Merchant Services','Business Savings'];
    const missing2 = ALL_PRODS2.filter(p => !mc.prods.includes(p));
    const pctWallet2 = Math.round((mc.prods.length / ALL_PRODS2.length) * 100);
    const recLine2 = mc.rec
      ? `Active <strong>${mc.rec}</strong> rec — ${mc.trig || 'recommendation triggered'}`
      : `No active recommendation (propensity: ${mc.prop}%)`;
    const healthLabel = {r:'🔴 At-risk',a:'🟡 Needs attention',g:'🟢 Healthy',x:'⚪ No signal'}[mc.health] || '';
    return `<strong>${fn} · ${mc.co}</strong> · ${healthLabel}<br><br>${recLine2}<br><br><strong>Portfolio:</strong> ${mc.prods.join(', ')} · ${pctWallet2}% wallet share. Gaps: ${missing2.slice(0,3).join(', ')}.<br><strong>Revenue:</strong> ${mc.rev} · <strong>Employees:</strong> ${mc.emp} · <strong>Last contact:</strong> ${mc.lc}<br><br>${mc.notes}`;
  }

  if (/cd|matur/.test(q))
    return `<strong>Harmon & Diaz LLC</strong> has a CD maturing in 28 days with no renewal outreach logged. They're rate-sensitive — reach out before they shop competing rates. Recommendation type: Rules-based. They're on today's outreach list.`;

  if (/nudge|overdue|stall/.test(q))
    return `Two Nudges are currently active: <strong>Maria Chen</strong> (cash mgmt signal, $185K deposit, 48h no contact, 72% propensity) and <strong>Ridgeline HVAC</strong> (equipment financing proposal stalled at 14 days — at risk of going cold). Both need contact today.`;

  if (/coverage|percent|rate/.test(q)) {
    const noContact = D.clients.filter(c => c.lcd >= 30).length;
    return `Portfolio coverage is at <strong>68%</strong>. <strong>${noContact} clients</strong> have had no contact in 30+ days. Meza Landscaping is the highest churn risk at 38 days with a single product. At-risk count: ${D.clients.filter(c=>c.health==='r').length}.`;
  }

  if (/propensity|highest|best score/.test(q))
    return `Top propensity clients today: <strong>Brightwell Foods (82%)</strong>, Maria Chen (72%), Blue Heron Logistics (65%), Palo Verde Dental (55%). All four have open recommendations — Brightwell Foods has the highest score but no active rec, making it an opportunistic call.`;

  if (/priority|who first|start|begin|today|call|morning|plan my/.test(q))
    return `Priority outreach today: <strong>1. Maria Chen</strong> — active Nudge, $185K signal, 72% propensity, 48h no contact. <strong>2. Ridgeline HVAC</strong> — proposal stalled 14 days, risk of losing deal. <strong>3. Harmon & Diaz</strong> — CD maturing in 28 days, Referral not yet actioned. <strong>4. Blue Heron Logistics</strong> — Offer triggered, payroll up 34%.`;

  if (/book|how many|total|all client/.test(q)) {
    const atRisk = D.clients.filter(c => c.health === 'r').length;
    const needAttn = D.clients.filter(c => c.health === 'a').length;
    const healthy = D.clients.filter(c => c.health === 'g').length;
    const openRecs = D.clients.filter(c => c.rec).length;
    return `Your book has <strong>${D.clients.length} total clients</strong>: ${atRisk} at-risk, ${needAttn} need attention, ${healthy} healthy. <strong>${openRecs} clients</strong> have open recommendations today. Portfolio coverage: 68%.`;
  }

  if (/at.?risk|churn|danger/.test(q))
    return `At-risk clients: <strong>Maria Chen</strong> (nudge active, 48h no contact) and <strong>Ridgeline HVAC</strong> (proposal stalled, 14 days). Both need outreach today. Use the <em>Needs contact</em> filter in Clients view for the full at-risk list — ${D.clients.filter(c=>c.lcd>=28).length} clients have had no contact in 28+ days.`;

  if (/tier i|tier 1|top|premium/.test(q))
    return `Your Tier I clients include Maria Chen, Palo Verde Dental, Brightwell Foods, and Meza Landscaping. Tier I accounts should be contacted at least every 7 days. Of these, Meza Landscaping is the most overdue at 38 days.`;

  if (/activity|log|outcome|conversion|win/.test(q)) {
    const conv2 = D.activity.filter(a => a.out === 'c').length;
    const pend = D.activity.filter(a => a.out === 'p').length;
    const dism = D.activity.filter(a => a.out === 'd').length;
    return `Activity this period: <strong>${conv2} conversions</strong>, ${pend} pending, ${dism} dismissed. Most recent win: <strong>Brightwell Foods</strong> — Treasury offer accepted (Offer recommendation). Last pending: <strong>Palo Verde Dental</strong> — Advice acted on, terms sheet sent for loan inquiry.`;
  }

  if (/outreach|list|today|dashboard/.test(q))
return `Today's outreach list has <strong>${D.clients.filter(c=>c.rec).slice(0,8).length} clients</strong>: Nudges for Maria Chen and Ridgeline HVAC, an Offer for Blue Heron Logistics, a Referral alert for Harmon & Diaz, and an Advice alert for Palo Verde Dental.`;

  if (/summary|overview|brief|how am i|doing|snapshot|what's (going on|happening|my)|catch me up|morning|help/.test(q)) {
    const atRisk = D.clients.filter(c => c.health === 'r').length;
    const noContact = D.clients.filter(c => c.lcd >= 30).length;
    const openRecs = D.clients.filter(c => c.rec).length;
    const conv2 = D.activity.filter(a => a.out === 'c').length;
    return `Here's your snapshot for today:<br><br><strong>Outreach list:</strong> ${openRecs} clients with open recommendations — top priority is <strong>Maria Chen</strong> (nudge, $185K signal) and <strong>Ridgeline HVAC</strong> (proposal stalling).<br><br><strong>Book health:</strong> ${atRisk} at-risk, ${noContact} with no contact in 30+ days, 68% coverage rate.<br><br><strong>Activity:</strong> ${conv2} conversions logged this month. <strong>Palo Verde Dental</strong> and <strong>Irongate Construction</strong> have pending outcomes awaiting follow-up.<br><br><strong>Highest propensity:</strong> Brightwell Foods (82%), Maria Chen (72%), Blue Heron Logistics (65%).`;
  }

  if (/product|treasury|bloc|loc|cd|payroll|card|merchant|saving/.test(q)) {
    const recClients = D.clients.filter(c => c.rec).slice(0,4);
    return `Across today's outreach list, the most common product opportunities are: <strong>Treasury</strong> (Brightwell Foods, Blue Heron), <strong>LOC / BLOC</strong> (Ridgeline HVAC, Palo Verde Dental), and <strong>CD renewal</strong> (Harmon & Diaz). Navigate to a client profile to see their specific product gap and wallet share.`;
  }

  if (/recommend|rec\b|suggestion|who (to|should) call|what (rec|action)/.test(q))
    return `Open recommendations today: <strong>Maria Chen</strong> (Nudge — cash mgmt), <strong>Ridgeline HVAC</strong> (Nudge — stalled proposal), <strong>Blue Heron Logistics</strong> (Offer — payroll growth), <strong>Harmon & Diaz</strong> (Referral — CD maturing), <strong>Palo Verde Dental</strong> (Advice — web intent). Click any client on the dashboard to see the full brief.`;

  // Smart general fallback — synthesize a useful book snapshot rather than a dead end
  {
    const atRisk = D.clients.filter(c => c.health === 'r').length;
    const openRecs = D.clients.filter(c => c.rec).length;
    const noContact = D.clients.filter(c => c.lcd >= 30).length;
    return `I'm not sure I caught that — here's what's most relevant right now:<br><br>• <strong>${openRecs} open recommendations</strong> on today's outreach list<br>• <strong>${atRisk} at-risk clients</strong> needing immediate contact<br>• <strong>${noContact} clients</strong> with no contact in 30+ days<br>• Top priority: <strong>Maria Chen</strong> (nudge, 72% propensity) → open her profile for the full brief<br><br>Try asking: "Who should I call first?", "What's my coverage rate?", or name a specific client.`;
  }
}

function showLogModal(cid) {

  const modal = document.getElementById('modal');
  let logOut = null;
  const render = () => {
    modal.innerHTML = `

      <div class="mbody">
        <div class="msec">

            <div class="rchip${logOut==='p'?' s-pend':''}" onclick="(function(){logOutM='p';document.querySelectorAll('#log-modal-chips .rchip').forEach(function(el){el.className='rchip'+(el.dataset.v==='c'?' s-conv':el.dataset.v==='p'?' s-pend':el.dataset.v==='d'?' s-dism':'')});})()">~ Still pending</div>
            <div class="rchip${logOut==='d'?' s-dism':''}" onclick="(function(){logOutM='d';document.querySelectorAll('#log-modal-chips .rchip').forEach(function(el){el.className='rchip'+(el.dataset.v==='c'?' s-conv':el.dataset.v==='p'?' s-pend':el.dataset.v==='d'?' s-dism':'')});})()">— Dismissed</div>
          </div>
        </div>
        <div class="msec">
          <div class="mlbl">Contact method</div>
          <select class="fselect" id="mlog-method" style="margin-top:6px"><option>Phone call</option><option>Email</option><option>In-person meeting</option><option>Video call</option></select>
        </div>
        <div class="msec">
          <div class="mlbl">Notes</div>
          <textarea class="ftextarea" id="mlog-notes" rows="4" placeholder="What happened? Any follow-up needed?" style="margin-top:6px"></textarea>
        </div>
      </div>
      <div class="mfooter">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn pri" onclick="submitLogModal(${c.id})">Save outcome</button>
      </div>`;
    // Wire up chip clicks properly after render
    const chips = modal.querySelectorAll('.radio-grp .rchip');

    chips.forEach((el, i) => {
      el.dataset.v = vals[i];
      el.onclick = () => {
        logOutM = vals[i];
        chips.forEach((ch, j) => {
          ch.className = 'rchip' + (j===i ? (vals[i]==='c'?' s-conv':vals[i]==='p'?' s-pend':' s-dism') : '');
        });
      };
    });
  };
  render();
}

window.logOutM = null;

function submitLogModal(cid) {
  if (!window.logOutM) { showToast('⚠ Please select an outcome'); return; }
  const c = D.clients.find(x=>x.id===cid)||D.clients[0];
  const notes = document.getElementById('mlog-notes')?.value?.trim() || '';
  const method = document.getElementById('mlog-method')?.value || 'Phone call';
  const lbls = {c:'Converted',p:'Pending',d:'Dismissed'};
  const now = new Date(); const mm=String(now.getMonth()+1).padStart(2,'0'); const dd=String(now.getDate()).padStart(2,'0'); const yy=String(now.getFullYear()).slice(-2);
  D.activity.unshift({ id: Date.now(), cn: c.name, desc: notes||'No additional notes', out: window.logOutM, time: `${mm}/${dd}/${yy}`, rec: c.rec||null, method });
  window.logOutM = null;
  closeModal();
  showToast('✓ Outcome logged successfully');
}
