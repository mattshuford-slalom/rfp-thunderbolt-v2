<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RM Portal — Truist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root {
  --p950:#150428; --p900:#2D0A4E; --p800:#4B286D;
  --p700:#5E3485; --p600:#7B4DB5; --p500:#9B6FCC;
  --p400:#B898DC; --p300:#D4BEF0; --p200:#E8DCFA;
  --p100:#F3EDFC; --p50:#F9F6FE;
  --bg:#F2EEF9; --sur:#fff;
  --bdr:#DDD3EF; --bdr-l:#EDE5F8;
  --tx:#1A0B2E; --tx2:#503D6A; --tx3:#8B78A8;
  --red:#D93025; --red-l:#FEE8E6; --red-s:#E74C3C;
  --amb:#B45309; --amb-l:#FEF3E2; --amb-s:#D97706;
  --grn:#1A7A47; --grn-l:#EAFAF1; --grn-d:#27AE60;
  --gray-d:#A09CB0;
  --rmd:10px; --rlg:14px; --rfull:9999px;
  --ssm:0 1px 3px rgba(75,40,109,.08),0 1px 2px rgba(75,40,109,.04);
  --smd:0 4px 16px rgba(75,40,109,.10),0 2px 4px rgba(75,40,109,.06);
  --spur:0 4px 14px rgba(75,40,109,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column}

/* ── APP SHELL ──────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOPBAR ─────────────────────────────────────────────── */
.topbar{height:79px;border-bottom:1px solid var(--bdr-l);background:linear-gradient(180deg,#fff 0%,var(--p50) 100%);display:flex;align-items:center;padding:0 31px;gap:18px;flex-shrink:0;z-index:20}
.tb-logo{display:flex;flex-direction:row;align-items:center;gap:11px;cursor:pointer;text-decoration:none;line-height:1}
.tb-logo-text{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.tb-brand{font-size:20px;font-weight:700;color:var(--p900);letter-spacing:-.02em}
.tb-sub{font-size:12px;font-weight:500;color:var(--tx3);letter-spacing:.02em}
.tb-spacer{flex:1}
.tb-date{font-size:14px;font-weight:500;color:var(--tx3);white-space:nowrap}
.tb-cop{font-size:14px;font-weight:600;padding:9px 20px;border:1px solid var(--p300);border-radius:var(--rfull);color:var(--p700);cursor:pointer;background:#fff;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;user-select:none}
.tb-cop.on{background:linear-gradient(135deg,var(--p700),var(--p900));color:#fff;border-color:transparent;box-shadow:var(--spur)}
.tb-back{font-size:15px;font-weight:500;color:var(--tx3);cursor:pointer;display:flex;align-items:center;gap:4px;text-decoration:none}
.tb-back:hover{color:var(--p700)}
.tb-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--p600),var(--p900));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 2px 6px rgba(75,40,109,.3)}.tb-av-info{display:flex;flex-direction:column;line-height:1.2}.tb-av-name{font-size:13px;font-weight:600;color:var(--tx)}.tb-av-role{font-size:11px;color:var(--tx3)}

/* ── LAYOUT ─────────────────────────────────────────────── */
.layout{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar{width:208px;border-right:1px solid var(--bdr-l);background:linear-gradient(180deg,var(--p50) 0%,#fff 60%);display:flex;flex-direction:column;align-items:flex-start;padding:18px 12px;gap:4px;flex-shrink:0}
.sb-ic{width:100%;height:48px;border-radius:var(--rmd);display:flex;align-items:center;gap:12px;padding:0 12px;color:var(--tx3);cursor:pointer;transition:all .15s;text-decoration:none;border:none;background:transparent;font-size:13px;font-weight:500}
.sb-ic:hover{background:var(--p100);color:var(--p700)}.sb-ic svg{flex-shrink:0}
.sb-ic.on{background:linear-gradient(145deg,var(--p700),var(--p900));color:#fff;box-shadow:0 3px 10px rgba(75,40,109,.35)}
.sb-div{width:100%;height:1px;background:var(--bdr-l);margin:8px 0}

/* ── MAIN ───────────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}

/* ── COPILOT PANEL ──────────────────────────────────────── */
.cp-panel{width:364px;border-left:1px solid var(--bdr-l);display:flex;flex-direction:column;flex-shrink:0;background:var(--sur);transition:width .2s,opacity .2s}
.cp-panel.off{width:0;opacity:0;overflow:hidden;pointer-events:none;border:none}
.cp-hd{padding:12px 16px;background:linear-gradient(140deg,var(--p900),var(--p700));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cp-hd-l{display:flex;align-items:center;gap:8px}
.cp-ic{width:22px;height:22px;background:rgba(255,255,255,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.cp-ttl{font-size:14px;font-weight:700;color:#fff}
.cp-x{width:22px;height:22px;font-size:13px;color:rgba(255,255,255,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:5px;transition:all .15s;background:transparent;border:none}
.cp-x:hover{background:rgba(255,255,255,.12);color:#fff}
.cp-ctx{padding:6px 16px;border-bottom:1px solid var(--bdr-l);font-size:12px;font-weight:600;color:var(--p600);background:var(--p50);letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.cp-msgs{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.msg{font-size:14px;line-height:1.65;padding:9px 11px;border-radius:var(--rmd)}
.msg.sys{background:var(--p50);color:var(--tx3);border:1px solid var(--bdr-l);font-style:italic}
.msg.usr{background:linear-gradient(135deg,var(--p700),var(--p600));color:#fff;align-self:flex-end;max-width:90%;box-shadow:0 2px 8px rgba(75,40,109,.22)}
.msg.ast{background:var(--sur);color:var(--tx2);border:1px solid var(--bdr);box-shadow:var(--ssm)}
.msg.typ{background:var(--p50);color:var(--tx3);border:1px solid var(--bdr-l);letter-spacing:3px}
.cp-in-area{padding:10px 12px;border-top:1px solid var(--bdr-l);display:flex;gap:8px;align-items:center;background:var(--p50);flex-shrink:0}
.cp-in{flex:1;font-size:14px;font-family:inherit;padding:7px 11px;border:1px solid var(--bdr);border-radius:var(--rfull);color:var(--tx);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}
.cp-in:focus{border-color:var(--p500);box-shadow:0 0 0 3px rgba(155,111,204,.18)}
.cp-in::placeholder{color:var(--tx3)}
.cp-btn{width:32px;height:32px;background:linear-gradient(145deg,var(--p700),var(--p900));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;cursor:pointer;flex-shrink:0;box-shadow:0 2px 8px rgba(75,40,109,.3);border:none;font-family:inherit}
.cp-btn:hover{background:linear-gradient(145deg,var(--p600),var(--p800))}
.cp-sugg{padding:8px 12px 6px;display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid var(--bdr-l);background:var(--p50);flex-shrink:0}
.cp-sugg-lbl{width:100%;font-size:12px;font-weight:600;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
.sq{font-size:13px;font-weight:500;color:var(--p700);background:#fff;border:1px solid var(--p300);border-radius:var(--rfull);padding:4px 11px;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.sq:hover{background:var(--p100);border-color:var(--p500)}

/* ── CONTENT ─────────────────────────────────────────────── */
.content{padding:14px;display:flex;flex-direction:column;gap:11px}

/* ── STAT ROW ────────────────────────────────────────────── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-box{background:var(--sur);border:1px solid var(--bdr-l);border-radius:var(--rmd);padding:22px;position:relative;overflow:hidden}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--p400),var(--p600));border-radius:3px 3px 0 0}
.stat-n{font-size:36px;font-weight:700;color:var(--tx);margin-bottom:6px;letter-spacing:-.03em;line-height:1}
.stat-l{font-size:14px;font-weight:500;color:var(--tx3)}
.stat-n.warn{color:var(--red)}
.stat-box.is-warn::before{background:linear-gradient(90deg,var(--red-s),#C0392B)}
.stat-n.ok{color:var(--grn)}
.stat-box.is-ok::before{background:linear-gradient(90deg,var(--grn-d),var(--grn))}

/* ── LIST CARD ───────────────────────────────────────────── */
.lcard{border:1px solid var(--bdr);border-radius:var(--rmd);overflow:hidden;box-shadow:var(--ssm)}
.lcard-hd{padding:8px 14px;background:linear-gradient(180deg,var(--p50),var(--p100));border-bottom:1px solid var(--bdr-l);display:flex;align-items:center;justify-content:space-between}
.lcard-lbl{font-size:13px;font-weight:700;color:var(--p800);letter-spacing:.05em;text-transform:uppercase}
.lcard-ct{font-size:13px;font-weight:600;color:var(--p700);background:var(--p200);padding:2px 9px;border-radius:var(--rfull)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.ocard{background:var(--sur);border:1px solid var(--bdr-l);border-radius:var(--rmd);padding:16px 18px;cursor:pointer;transition:box-shadow .15s,border-color .15s;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;box-shadow:var(--ssm)}
.ocard::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;border-radius:3px 3px 0 0;background:linear-gradient(90deg,var(--p400),var(--p600))}
.ocard.h-r{background:#fff}
.ocard.h-r::before{background:linear-gradient(90deg,var(--red-s),#C0392B)}
.ocard.h-a{background:#fff}
.ocard.h-a::before{background:linear-gradient(90deg,var(--amb-s),var(--amb))}
.ocard:hover{box-shadow:0 4px 16px rgba(75,40,109,.13);border-color:var(--p300)}
.ocard-top{display:flex;align-items:center}
.ocard-names{flex:1;min-width:0}
.ocard-pill-row{display:flex;align-items:center;gap:8px}
.ocard-co{font-size:15px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ocard-poc{font-size:12px;color:var(--tx3);margin-top:1px}
.ocard-why{font-size:13px;color:var(--tx2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ocard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.ocard-time{font-size:12px;color:var(--tx3);font-weight:500}

/* ── CLIENT ROWS ─────────────────────────────────────────── */
.crow{display:flex;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid var(--bdr-l);cursor:pointer;position:relative;transition:background .12s}
.crow:last-child{border-bottom:none}
.crow:hover{background:var(--p50)}
.ns{position:absolute;left:0;top:0;bottom:0;width:3px}
.ns.r{background:var(--red-s)}
.ns.a{background:var(--amb-s)}
.cav{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--p200),var(--p300));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--p800);flex-shrink:0;border:1.5px solid var(--p300)}
.cbody{flex:1;min-width:0}
.cname{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:2px;letter-spacing:-.01em}
.ctrig{font-size:13px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chev{font-size:18px;color:var(--p400);line-height:1}
.ctime{font-size:10px;font-weight:500;color:var(--tx3)}

/* ── BADGES ──────────────────────────────────────────────── */
.badge{font-size:12px;font-weight:700;padding:2px 8px;border-radius:var(--rfull);letter-spacing:.01em;white-space:nowrap}
.b-rt{background:var(--p100);color:var(--p700);border:1px solid var(--p300)}
.b-prop{background:var(--amb-l);color:var(--amb);border:1px solid rgba(212,130,0,.2)}
.b-rules{background:var(--grn-l);color:var(--grn);border:1px solid rgba(39,174,96,.2)}
.b-nudge{background:var(--red-l);color:var(--red);border:1px solid rgba(231,76,60,.2)}

/* ── CLIENT WORKSPACE HEADER ─────────────────────────────── */
.ch{padding:13px 14px;border-bottom:1px solid var(--bdr-l);display:flex;align-items:center;gap:16px;flex-shrink:0;background:linear-gradient(180deg,var(--p50),#fff)}
.chav{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--p700),var(--p950));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 3px 12px rgba(75,40,109,.3)}
.chname{font-size:18px;font-weight:700;color:var(--tx);letter-spacing:-.02em}
.chsub{font-size:13px;font-weight:500;color:var(--tx3);margin-top:2px}
.chbadges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}

/* ── TAB BAR (hidden — state kept for Copilot context) ────── */
.tabs{display:none}
.tab{display:none}

/* ── SECTION DIVIDERS ───────────────────────────────────── */
.sec-div{display:flex;align-items:center;gap:10px;padding:20px 0 8px}
.sec-div-lbl{font-size:11px;font-weight:700;color:var(--p600);letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.sec-div-line{flex:1;height:1px;background:linear-gradient(90deg,var(--bdr),transparent)}

/* ── TAB CONTENT ─────────────────────────────────────────── */
.tcont{padding:14px;display:flex;flex-direction:column;gap:10px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sblock{border:1px solid var(--bdr-l);border-radius:var(--rmd);padding:10px 12px;display:flex;flex-direction:column;gap:6px;background:var(--sur)}
.sbtitle{font-size:12px;font-weight:700;color:var(--p600);letter-spacing:.07em;text-transform:uppercase}
.sbbody{font-size:14px;color:var(--tx2);line-height:1.6}
.sbbody strong{font-weight:700;color:var(--tx)}
.tp-list{display:flex;flex-direction:column;gap:6px}
.tp-item{display:flex;gap:9px;font-size:14px;color:var(--tx2);line-height:1.55}
.tp-n{font-size:13px;font-weight:700;color:var(--p500);flex-shrink:0;width:16px;padding-top:1px}
.act-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:var(--rmd);border:1px solid var(--bdr);font-size:14px;font-weight:600;color:var(--tx);background:transparent;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:-.01em}
.btn:hover{border-color:var(--p400);color:var(--p700);background:var(--p50)}
.btn.pri{background:linear-gradient(135deg,var(--p700),var(--p900));color:#fff;border-color:transparent;box-shadow:var(--spur)}
.btn.pri:hover{background:linear-gradient(135deg,var(--p600),var(--p800));box-shadow:0 6px 18px rgba(75,40,109,.4)}

/* ── CONTEXT TAB ─────────────────────────────────────────── */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.citem{border:1px solid var(--bdr-l);border-radius:var(--rmd);padding:9px 10px}
.ckey{font-size:12px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.cval{font-size:15px;font-weight:600;color:var(--tx)}
.cval.sm{font-size:14px;font-weight:400;color:var(--tx2);line-height:1.5}

/* ── PORTFOLIO TAB ───────────────────────────────────────── */
.pi{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr-l)}
.pi:last-child{border-bottom:none}
.pi-name{font-size:15px;font-weight:500;color:var(--tx)}
.pi-meta{font-size:13px;color:var(--tx3);margin-top:2px}
.pi-badge{font-size:13px;font-weight:600;color:var(--p700);background:var(--p100);padding:3px 10px;border-radius:var(--rfull);border:1px solid var(--p300)}

/* ── LOG OUTCOME TAB ─────────────────────────────────────── */
.radio-grp{display:flex;gap:8px;flex-wrap:wrap}
.rchip{padding:7px 16px;border-radius:var(--rfull);border:1px solid var(--bdr);font-size:14px;font-weight:600;color:var(--tx3);cursor:pointer;transition:all .15s;user-select:none}
.rchip:hover{border-color:var(--p400);color:var(--p700)}
.rchip.s-conv{background:var(--grn-l);color:var(--grn);border-color:rgba(39,174,96,.3)}
.rchip.s-pend{background:var(--amb-l);color:var(--amb);border-color:rgba(212,130,0,.3)}
.rchip.s-dism{background:var(--red-l);color:var(--red);border-color:rgba(217,48,37,.3)}
.form-row{display:flex;flex-direction:column;gap:6px}
.form-lbl{font-size:13px;font-weight:600;color:var(--tx2)}
.fselect{font-size:14px;font-family:inherit;padding:7px 10px;border:1px solid var(--bdr);border-radius:var(--rmd);color:var(--tx);background:#fff;outline:none}
.fselect:focus{border-color:var(--p500);box-shadow:0 0 0 3px rgba(155,111,204,.18)}
.ftextarea{width:100%;font-size:14px;font-family:inherit;padding:10px 12px;border:1px solid var(--bdr);border-radius:var(--rmd);color:var(--tx);resize:none;outline:none;line-height:1.6;transition:border-color .15s}
.ftextarea:focus{border-color:var(--p500);box-shadow:0 0 0 3px rgba(155,111,204,.18)}

/* ── SEARCH BAR ──────────────────────────────────────────── */
.sbar{display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid var(--bdr-l);background:var(--p50);flex-wrap:wrap}
.sinput{flex:1;min-width:140px;font-size:14px;font-family:inherit;padding:6px 12px 6px 30px;border:1px solid var(--bdr);border-radius:var(--rfull);color:var(--tx);background:url("data:image/svg+xml,%3Csvg width='13' height='13' viewBox='0 0 13 13' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='5.5' cy='5.5' r='4' stroke='%238B78A8' stroke-width='1.5'/%3E%3Cline x1='9' y1='9' x2='12' y2='12' stroke='%238B78A8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E") no-repeat 10px center,#fff;outline:none;transition:border-color .15s,box-shadow .15s}
.sinput:focus{border-color:var(--p500);box-shadow:0 0 0 3px rgba(155,111,204,.18)}
.sinput::placeholder{color:var(--tx3)}
.fpill{font-size:13px;font-weight:600;padding:4px 13px;border-radius:var(--rfull);border:1px solid var(--bdr);color:var(--tx3);cursor:pointer;white-space:nowrap;transition:all .15s;user-select:none}
.fpill:hover{border-color:var(--p400);color:var(--p700)}
.fpill.on{background:linear-gradient(135deg,var(--p700),var(--p900));color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(75,40,109,.28)}

/* ── BOOK GRID ───────────────────────────────────────────── */
.col-hd{display:grid;grid-template-columns:11px 1fr 110px 90px 330px;gap:12px;align-items:center;padding:7px 13px;border-bottom:1px solid var(--bdr-l);background:#fff}
.col-l{font-size:12px;font-weight:700;color:var(--tx3);letter-spacing:.07em;text-transform:uppercase}
.bgrow{display:grid;grid-template-columns:11px 1fr 110px 90px 330px;gap:12px;align-items:center;padding:10px 13px;border-bottom:1px solid var(--bdr-l);cursor:pointer;transition:background .12s;background:#fff}
.bgrow:last-child{border-bottom:none}
.bgrow:hover{background:var(--p50)}
.bgname{font-size:15px;font-weight:600;color:var(--tx);letter-spacing:-.01em;line-height:1.35}
.bgmeta{font-size:13px;font-weight:500;color:var(--tx3);margin-top:2px;line-height:1.35}
.hdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.h-g{background:var(--grn-d)}
.h-a{background:var(--amb-s)}
.h-r{background:var(--red-s)}
.h-x{background:var(--gray-d)}

/* ── ACTIVITY ────────────────────────────────────────────── */
.arow{display:flex;align-items:flex-start;gap:13px;padding:9px 13px;border-bottom:1px solid var(--bdr-l);transition:background .12s;background:#fff}
.arow:last-child{border-bottom:none}
.arow:hover{background:var(--p50)}
.opill{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.o-c{background:var(--grn-l);color:var(--grn);border:1.5px solid rgba(39,174,96,.25)}

.tl-wrap{padding:8px 24px 24px 24px;display:flex;flex-direction:column}
.tl-item{display:grid;grid-template-columns:80px 24px 1fr;gap:0 16px;position:relative;min-height:80px}

.overlay{position:fixed;inset:0;background:rgba(21,4,40,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.overlay.off{display:none}
.modal{background:#fff;border-radius:var(--rlg);box-shadow:0 24px 64px rgba(21,4,40,.35);max-width:500px;width:100%;overflow:hidden;animation:mup .2s ease}
@keyframes mup{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhd{padding:18px 20px;background:linear-gradient(140deg,var(--p900),var(--p700));display:flex;align-items:center;justify-content:space-between}
.mttl{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.01em}
.mx{font-size:20px;color:rgba(255,255,255,.6);cursor:pointer;line-height:1;transition:color .15s;background:transparent;border:none}
.mx:hover{color:#fff}
.mbody{padding:14px;display:flex;flex-direction:column;gap:10px}
.msec{display:flex;flex-direction:column;gap:6px}
.mlbl{font-size:12px;font-weight:700;color:var(--p600);text-transform:uppercase;letter-spacing:.06em}
.mval{font-size:15px;color:var(--tx2);line-height:1.55}
.mval.hi{color:var(--tx);font-weight:600;font-size:16px}
.mfooter{padding:10px 14px;border-top:1px solid var(--bdr-l);display:flex;gap:8px;justify-content:flex-end;background:var(--p50)}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--p900);color:#fff;padding:12px 20px;border-radius:var(--rmd);font-size:12px;font-weight:600;z-index:300;box-shadow:var(--spur);display:flex;align-items:center;gap:8px;transition:all .3s;animation:tup .3s ease}

.empty{padding:34px;text-align:center;color:var(--tx3)}

function route() {
  const h = (location.hash || '#/dashboard').replace('#','');
  if (!h || h === '/' || h === '/dashboard') { S.view = 'dashboard'; S.cid = null; }
  else if (h.startsWith('/client/')) { S.view = 'client'; S.cid = parseInt(h.split('/')[2])||1; S.tab = 'rec'; S.logOut = null; }
  else if (h === '/book') { S.view = 'book'; }
  else if (h === '/activity') { S.view = 'activity'; }
  render();
}
function go(path) { location.hash = path; route(); }
function goClient() { go(S.cid ? '/client/'+S.cid : '/client/1'); }
window.addEventListener('hashchange', route);

function genWhy(c) {
  const fn = esc(c.co);
  const templates = {
    nudge: [
      `<strong>${c.lcd} days since last RM contact</strong> — propensity at ${c.prop}% suggests high receptivity. Re-engagement window is open now.`,
      `<strong>No outreach logged in ${c.lcd} days</strong> — last interaction indicated interest in expanding the relationship. Competitor risk is elevated.`,
      `<strong>Contact gap of ${c.lcd} days with normal account activity</strong> — client is active but unengaged. Optimal moment to reconnect.`,
      `<strong>${c.lcd}-day contact lapse</strong> — ${c.prop}% propensity score is the highest in the past 90 days for this account.`,
    ],
    propensity: [
      `<strong>Transaction patterns indicate readiness for a new product conversation</strong> — ${c.prop}% propensity, top quartile for ${esc(c.ind)}.`,
      `<strong>Revenue at ${esc(c.rev)} with only ${c.prods.length} active product(s)</strong> — significant wallet share uncaptured. ${c.prop}% propensity confirmed.`,
      `<strong>Under-penetrated vs. comparable ${esc(c.ind)} clients at ${esc(c.rev)}</strong> — peer benchmark shows ${c.prods.length + 2} products typical for this profile.`,
      `<strong>Current mix of ${c.prods.slice(0,2).map(p=>esc(p)).join(' and ')} leaves cross-sell opportunity open</strong> — ${c.prop}% propensity score based on spending patterns.`,
    ],
    rules: [
      `<strong>Account meets threshold for treasury services</strong> — ${esc(c.ind)} profile at ${esc(c.rev)} revenue qualifies. No outreach initiated yet.`,
      `<strong>CD or term product nearing maturity with no renewal outreach logged</strong> — rate-sensitive client, window is closing.`,
      `<strong>${fn} holds ${c.prods.length} product(s) vs. ${c.prods.length + 2} typical for comparable ${esc(c.ind)} clients</strong> — product gap warrants a conversation.`,
      `<strong>BLOC utilization above 70%</strong> — may indicate need for a limit increase or supplemental credit line. Good time to check in.`,
    ],
    rt: [
      `<strong>Browsed financing options on truist.com within the last 24 hours</strong> — high-intent signal. Best window to reach out is now.`,
      `<strong>Wire transfer above average velocity received this morning</strong> — possible liquidity event or contract close. Cash management conversation is timely.`,
      `<strong>Application started but not completed on truist.com</strong> — active need indicated. ${c.prop}% propensity confirms product fit.`,
      `<strong>Large ACH payment received today</strong> — possible contract close or capital infusion. Opportunity to introduce sweep or treasury tools.`,
    ],
  };
  const pool = templates[c.rec] || templates.nudge;
  return pool[c.id % pool.length];
}

function genOpener(c) {
  const fn = esc(c.co.split(' ')[0]);
  const openers = [
    `"Hi, I was reviewing your account and noticed some activity I wanted to follow up on — do you have a few minutes this week?"`,
    `"${fn}, I've been keeping an eye on your account and think there's a timely opportunity worth a quick conversation."`,
    `"I wanted to reach out personally — I noticed some signals in your account that I think are worth discussing."`,
    `"Hi, I'm calling because our system flagged your account for a time-sensitive conversation — happy to walk you through what we're seeing."`,
    `"${fn}, based on your recent activity, I think we have a product that could be a strong fit. Mind if I take 5 minutes to explain?"`,
    `"I was going through my book this morning and your account stood out — wanted to make sure we're supporting you in the right ways."`,
  ];
  return openers[c.id % openers.length];
}

function genTPs(c) {
  const allTPs = [
    `Review current product mix — ${c.prods.length} active product(s) vs. ${c.prods.length + 2} typical for ${esc(c.ind)} clients at ${esc(c.rev)}.`,
    `Explore treasury management fit given current revenue trajectory and employee headcount (${c.emp}).`,
    `Discuss business line of credit to support operational flexibility and working capital.`,
    `Introduce sweep account options to optimize idle cash between billing cycles.`,
    `Review CD or savings laddering strategy to improve liquidity without sacrificing yield.`,
    `Ask about upcoming capital needs — equipment, expansion, or hiring — to position lending products early.`,
    `Highlight Merchant Services if retail/service volume is growing — fee savings opportunity.`,
    `Discuss payroll integration if headcount is above 10 — simplify ops and deepen relationship.`,
    `Identify referral potential — clients in ${esc(c.ind)} often have strong professional networks.`,
    `Ask about personal banking relationship — Premier referral opportunity if deposits exceed threshold.`,
  ];
  // pick 3 deterministically based on client id
  const i = c.id % allTPs.length;
  return [allTPs[i], allTPs[(i+3)%allTPs.length], allTPs[(i+6)%allTPs.length]];
}

function convKey() { return S.view==='client' ? 'c'+S.cid : 'general'; }
function getConv() {
  const k = convKey();
  if (!S.convs[k]) {
    const c = D.clients.find(x=>x.id===S.cid);
    S.convs[k] = [{ r:'sys', t: c?`Loaded context for ${c.name}. Ask anything about this client.`:'Ask anything.' }];
  }
  return S.convs[k];
}

function getSuggestions() {
  const c = S.view==='client' ? D.clients.find(x=>x.id===S.cid) : null;
  const fn = c ? c.name.split(' ')[0] : '';
  const conv = getConv();
  const asked = new Set(conv.filter(m=>m.r==='usr').map(m=>m.t.toLowerCase()));
  let pool = [];

  if (c) {
    const tabFirst = {
      rec:  [`What triggered this recommendation?`, `What current products does ${fn} own?`, `Summarize recent touchpoint activity.`],
      ctx:  [`How long has ${fn} been a client?`, `What industry are they in?`, `What is ${fn}'s annual revenue?`],
      port: [`What products are missing from the portfolio?`, `What is their wallet share?`, `What should I recommend next?`],
      log:  [`What outcome should I log?`, `What is the best next step after this call?`, `How do I follow up after a dismissal?`],
    };
    const extra = [
      `What products does ${fn} have?`,
      `What is ${fn}'s propensity score?`,
      `What was the last contact with ${fn}?`,
      `What is ${fn}'s annual revenue?`,
      `What should I recommend next?`,
    ];
    const priority = tabFirst[S.tab] || extra.slice(0,3);
    pool = [...priority, ...extra.filter(s=>!priority.includes(s))];
  } else if (S.view==='book') {
    pool = [
      'Who has not been contacted in 30 or more days?',
      'Which clients are at risk?',
      'Who has the highest propensity score?',
      'Show me clients with open recommendations',
      'Which clients are Tier I?',
      'Who should I prioritise this week?',
    ];
  } else if (S.view==='activity') {
    pool = [
      'How many conversions this month?',
      'Which recommendations were dismissed?',
      'What is still pending?',
      'Show me recent wins',
      'Which clients have pending outcomes?',
    ];
  } else {
    pool = [
      'Who should I call first today?',
      'Which clients have a CD maturing soon?',
      'Are any nudges overdue?',
      'What is my portfolio coverage?',
      'Who has the highest propensity score?',
    ];
  }

  // After a reply, prepend follow-ups relevant to what was said
  const lastAst = [...conv].reverse().find(m=>m.r==='ast');
  if (lastAst) {
    const r = lastAst.t.toLowerCase();
    const fups = [];
    if (/checking|treasury|bloc|loc|cd|payroll|card|holds|products/.test(r))
      fups.push('What products are missing from the portfolio?', 'What should I recommend next?');
    if (/propensity|score|%/.test(r))
      fups.push('What recent signals triggered this recommendation?', 'What are the top talking points?');
    if (/opener|call|reach out/.test(r))
      fups.push('What are the top talking points?', 'What outcome should I log?');
    if (/revenue|employees|industry/.test(r))
      fups.push('What products are missing from the portfolio?', 'What is their wallet share?');
    if (/last contact|days ago|coverage/.test(r))
      fups.push('What is the recommended outreach approach?', 'What are the top talking points?');
    if (/nudge|overdue|stalled|14 day/.test(r))
      fups.push('Who should I call first today?', 'What are the top talking points?');
    if (/recommend|cross-sell|opportunit/.test(r))
      fups.push('What is the best next step after this call?', 'What outcome should I log?');
    if (fups.length) pool = [...fups, ...pool.filter(s=>!fups.includes(s))];
  }

  return pool.filter(s=>!asked.has(s.toLowerCase())).slice(0,3);
}

function refreshSuggestions() {
  const el = document.getElementById('cp-sugg');
  if (!el) return;
  const suggs = getSuggestions();
  el.innerHTML = suggs.length
    ? '<div class="cp-sugg-lbl">Suggested</div>' + suggs.map(s=>`<span class="sq" data-q="${esc(s)}" onclick="useSuggestion(this.dataset.q)">${esc(s)}</span>`).join('')
    : '';
}

function renderCopilot() {
  const el = document.getElementById('copilot');
  if (!S.copOpen) { el.className='cp-panel off'; el.innerHTML=''; return; }
  el.className = 'cp-panel';
  const c = S.view==='client' ? D.clients.find(x=>x.id===S.cid) : null;
  const ctx = c ? `Context: ${c.name} · ${c.co}` : 'General · No client selected';
  const ph = c ? `Ask about ${c.name}…` : 'Ask Copilot…';
  const conv = getConv();
  const suggs = getSuggestions();
  el.innerHTML = `
    <div class="cp-hd">
      <div class="cp-hd-l"><img src="microsoft_copilot-logo_brandlogos.net_zaqzr.png" style="width:22px;height:22px"><span class="cp-ttl">Copilot</span></div>
      <button class="cp-x" onclick="toggleCop()">✕</button>
    </div>
    <div class="cp-ctx">${ctx}</div>
    <div class="cp-msgs" id="cp-msgs">${conv.map(m=>`<div class="msg ${m.r==='sys'?'sys':m.r==='usr'?'usr':'ast'}">${m.t}</div>`).join('')}</div>
    <div class="cp-sugg" id="cp-sugg">${(()=>{const s=getSuggestions();return s.length?'<div class="cp-sugg-lbl">Suggested</div>'+s.map(q=>`<span class="sq" data-q="${esc(q)}" onclick="useSuggestion(this.dataset.q)">${esc(q)}</span>`).join(''):'';})()} </div>
    <div class="cp-in-area">
      <input class="cp-in" id="cp-in" placeholder="${ph}"/>
      <button class="cp-btn" onclick="sendCopilot()">↑</button>
    </div>`;
  const inp = document.getElementById('cp-in');
  if (inp) inp.onkeydown = e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendCopilot();} };
  scrollCop();
}

function scrollCop() { const m=document.getElementById('cp-msgs'); if(m) m.scrollTop=m.scrollHeight; }
function toggleCop() { S.copOpen=!S.copOpen; renderTopbar(); renderCopilot(); }
function useSuggestion(txt) {
  const inp = document.getElementById('cp-in');
  if (!inp || !txt) return;
  inp.value = txt;
  sendCopilot();
}

function sendCopilot() {
  const inp = document.getElementById('cp-in');
  const txt = inp?.value?.trim();
  if (!txt) return;
  inp.value = '';
  const conv = getConv();
  conv.push({ r:'usr', t: esc(txt) });
  renderCopilot();
  // typing indicator
  const msgs = document.getElementById('cp-msgs');
  if (msgs) {
    const t = document.createElement('div');
    t.className='msg typ'; t.id='cp-typ'; t.textContent='· · ·';
    msgs.appendChild(t); scrollCop();
  }
  setTimeout(() => {
    conv.push({ r:'ast', t: copilotReply(txt) });
    const msgsEl = document.getElementById('cp-msgs');
    if (msgsEl) {
      msgsEl.innerHTML = conv.map(m=>`<div class="msg ${m.r==='sys'?'sys':m.r==='usr'?'usr':'ast'}">${m.t}</div>`).join('');
      scrollCop();
    } else { renderCopilot(); }
    refreshSuggestions();
  }, 800 + Math.random()*600);
}

function copilotReply(q) {
  q = q.toLowerCase();
  const c = S.view==='client' ? D.clients.find(x=>x.id===S.cid) : null;
  if (c) {
    if (/product|hold|have|currently/.test(q)) return `${c.name} currently holds: <strong>${c.prods.join(', ')}</strong>. No ${['Treasury','BLOC','LOC'].filter(p=>!c.prods.includes(p)).slice(0,2).join(' or ')} yet — both are strong cross-sell opportunities.`;
    if (/revenue|size|big|large/.test(q)) return `${c.co} generates approximately <strong>${c.rev}</strong> in annual revenue with <strong>${c.emp} employees</strong>. Industry: ${c.ind}.`;
    if (/propensity|likelihood|score|chance/.test(q)) return `${c.name} has a <strong>${c.prop}% propensity score</strong> for next-product adoption, based on transaction behavior and peer benchmarks.`;
    if (/contact|last|when|touch/.test(q)) return `Last contact with ${c.name} was <strong>${c.lc}</strong>. ${c.lcd>7?'This is approaching the coverage threshold — outreach recommended soon.':'Coverage looks current.'}`;
    if (/note|background|context|tell|about/.test(q)) return c.notes;
    if (/suggest|recommend|next|should|opport/.test(q)) { const sugg=['Treasury','BLOC','LOC','CD','Payroll','Card','Merchant Services'].filter(p=>!c.prods.includes(p)).slice(0,3); return `Top recommendations for ${c.name}: <strong>${sugg.join(', ')}</strong>. Based on wallet share analysis and peer benchmarking.`; }
    return `${c.name} · ${c.tier} · ${c.ind} · ${c.rev} revenue · ${c.prop}% propensity. Last contact: ${c.lc}. Is there something specific I can help with?`;
  }
  if (/cd|matur/.test(q)) return `Harmon & Diaz LLC has a CD maturing in 28 days. No renewal outreach has been logged — they're on today's list.`;
  if (/nudge|overdue|miss/.test(q)) return `2 nudges are currently overdue: <strong>Maria Chen</strong> (cash mgmt, 48h no contact) and <strong>Ridgeline HVAC</strong> (proposal stalled, 14 days).`;
  if (/coverage|portfolio|percent/.test(q)) return `Portfolio coverage is at <strong>68%</strong>. Meza Landscaping is the most at-risk at 38 days without contact.`;
  if (/propensity|highest|best/.test(q)) return `Highest propensity clients: <strong>Brightwell Foods (82%)</strong>, Maria Chen (72%), Blue Heron Logistics (65%).`;
  if (/priority|who|first|start/.test(q)) return `Start with <strong>Maria Chen</strong> — active nudge, 72% propensity, and a clear $185K signal. Then follow up with Ridgeline HVAC.`;
  if (/book|how many|total|client/.test(q)) return `Your book has <strong>${D.clients.length} clients</strong>: ${D.clients.filter(c=>c.health==='r').length} at-risk, ${D.clients.filter(c=>c.health==='a').length} need attention, ${D.clients.filter(c=>c.health==='g').length} healthy.`;
  return `I can help with any client in your book, today's recommendations, or portfolio insights. Try asking about a specific client or "who should I call first?"`;
}

    const fn = c.name.split(' ')[0];
    const body = `Hi ${fn},\n\nI hope you're doing well. I wanted to reach out personally — I noticed some recent activity and want to make sure we're supporting you in the best way possible.\n\n${(TPS[c.id]||['Review your current banking relationship.'])[0]}\n\nI'd love to schedule a quick call at your convenience. Just reply to this email or call me directly.\n\nBest,\nJordan Williams\nRelationship Manager, Truist Bank`;
    modal.innerHTML = `
      <div class="mhd"><span class="mttl">✉️ Draft email — ${esc(c.name)}</span><button class="mx" onclick="closeModal()">✕</button></div>
      <div class="mbody">
        <div class="msec"><div class="mlbl">To</div><div class="mval">${esc(c.name)} · ${esc(c.co)}</div></div>
        <div class="msec"><div class="mlbl">Subject</div><input class="ftextarea" id="email-subj" style="margin-top:4px;padding:7px 10px;resize:none;height:auto" value="${esc(subj[c.id]||'Checking in — how can we help?')}"></div>

}
function closeModal() { document.getElementById('overlay').classList.add('off'); }

function showLogModal(cid) {
  const c = D.clients.find(x=>x.id===cid)||D.clients[0];
  const modal = document.getElementById('modal');
  let logOut = null;
  const render = () => {
    modal.innerHTML = `
      <div class="mhd"><span class="mttl">📋 Log outcome — ${esc(c.name)}</span><button class="mx" onclick="closeModal()">✕</button></div>
      <div class="mbody">
        <div class="msec">
          <div class="mlbl">Outcome</div>
          <div class="radio-grp" style="margin-top:6px">
            <div class="rchip${logOut==='c'?' s-conv':''}" onclick="(function(){logOutM='c';document.querySelectorAll('#log-modal-chips .rchip').forEach(function(el){el.className='rchip'+(el.dataset.v==='c'?' s-conv':el.dataset.v==='p'?' s-pend':el.dataset.v==='d'?' s-dism':'')});})()">✓ Converted</div>
            <div class="rchip${logOut==='p'?' s-pend':''}" onclick="(function(){logOutM='p';document.querySelectorAll('#log-modal-chips .rchip').forEach(function(el){el.className='rchip'+(el.dataset.v==='c'?' s-conv':el.dataset.v==='p'?' s-pend':el.dataset.v==='d'?' s-dism':'')});})()">~ Still pending</div>
            <div class="rchip${logOut==='d'?' s-dism':''}" onclick="(function(){logOutM='d';document.querySelectorAll('#log-modal-chips .rchip').forEach(function(el){el.className='rchip'+(el.dataset.v==='c'?' s-conv':el.dataset.v==='p'?' s-pend':el.dataset.v==='d'?' s-dism':'')});})()">— Dismissed</div>
          </div>
        </div>
        <div class="msec">
          <div class="mlbl">Contact method</div>
          <select class="fselect" id="mlog-method" style="margin-top:6px"><option>Phone call</option><option>Email</option><option>In-person meeting</option><option>Video call</option></select>
        </div>
        <div class="msec">
          <div class="mlbl">Notes</div>
          <textarea class="ftextarea" id="mlog-notes" rows="4" placeholder="What happened? Any follow-up needed?" style="margin-top:6px"></textarea>
        </div>
      </div>
      <div class="mfooter">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn pri" onclick="submitLogModal(${c.id})">Save outcome</button>
      </div>`;
    // Wire up chip clicks properly after render
    const chips = modal.querySelectorAll('.radio-grp .rchip');
    const vals = ['c','p','d'];
    chips.forEach((el, i) => {
      el.dataset.v = vals[i];
      el.onclick = () => {
        logOutM = vals[i];
        chips.forEach((ch, j) => {
          ch.className = 'rchip' + (j===i ? (vals[i]==='c'?' s-conv':vals[i]==='p'?' s-pend':' s-dism') : '');
        });
      };
    });
  };
  render();
}

window.logOutM = null;

function submitLogModal(cid) {
  if (!window.logOutM) { showToast('⚠ Please select an outcome'); return; }
  const c = D.clients.find(x=>x.id===cid)||D.clients[0];
  const notes = document.getElementById('mlog-notes')?.value?.trim() || '';
  const method = document.getElementById('mlog-method')?.value || 'Phone call';
  const lbls = {c:'Converted',p:'Pending',d:'Dismissed'};
  const now = new Date(); const mm=String(now.getMonth()+1).padStart(2,'0'); const dd=String(now.getDate()).padStart(2,'0'); const yy=String(now.getFullYear()).slice(-2);
  D.activity.unshift({ id: Date.now(), cn: c.name, desc: notes||'No additional notes', out: window.logOutM, time: `${mm}/${dd}/${yy}`, rec: c.rec||null, method });
  window.logOutM = null;
  closeModal();
  showToast('✓ Outcome logged successfully');
}

/* ============================================================
   TOAST
   ============================================================ */
let _toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast';
  clearTimeout(_toastT);
  _toastT = setTimeout(() => { t.className='toast off'; }, 3200);
}

/* ============================================================
   UTILS
   ============================================================ */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function re(id, html) { const el=document.getElementById(id); if(el) el.innerHTML=html; }
function rebind() {
  const bs=document.getElementById('book-s'); if(bs) bs.oninput=e=>{S.bsearch=e.target.value;refreshBook();};
  const as=document.getElementById('act-s'); if(as) as.oninput=e=>{S.asearch=e.target.value;refreshActivity();};
}
